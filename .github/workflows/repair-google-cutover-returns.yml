name: Repair Google Cutover Returns

on:
  workflow_dispatch:
    inputs:
      expected_missing_scans:
        description: Exact counts-only audit value for returned codes missing backend scans
        required: true
      expected_missing_returns:
        description: Exact counts-only audit value for existing scans missing return movement
        required: true
      approval:
        description: Exact one-shot production repair approval token
        required: true
      expected_plan_sha:
        description: SHA-256 from a prior read-only run; leave empty to generate evidence only
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: taksklad-production
  cancel-in-progress: false

jobs:
  repair:
    name: One-shot return lifecycle repair
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - name: Checkout exact main control plane
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Validate explicit scope
        env:
          EXPECTED_MISSING_SCANS: ${{ inputs.expected_missing_scans }}
          EXPECTED_MISSING_RETURNS: ${{ inputs.expected_missing_returns }}
          REPAIR_APPROVAL: ${{ inputs.approval }}
          EXPECTED_PLAN_SHA: ${{ inputs.expected_plan_sha }}
        run: |
          set -euo pipefail
          [[ "$EXPECTED_MISSING_SCANS" =~ ^[0-9]+$ ]]
          [[ "$EXPECTED_MISSING_RETURNS" =~ ^[0-9]+$ ]]
          test "$EXPECTED_MISSING_SCANS" = 7
          test "$EXPECTED_MISSING_RETURNS" = 22
          test "$REPAIR_APPROVAL" = GOOGLE_CUTOVER_RETURN_REPAIR_APPROVED
          if test -n "$EXPECTED_PLAN_SHA"; then
            [[ "$EXPECTED_PLAN_SHA" =~ ^[0-9a-f]{64}$ ]]
          fi

      - name: Package audited repair control plane
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          for name in ("tools/google_cutover_repair.py", "tools/google_cutover_audit.py"):
              path = Path(name)
              compile(path.read_text(encoding="utf-8"), str(path), "exec")
          PY
          bash -n deploy/vds/backup_postgres.sh
          tar -czf "$RUNNER_TEMP/taksklad-google-return-repair.tar.gz" \
            deploy/vds/backup_postgres.sh \
            deploy/vds/docker-compose.yml \
            tools/google_cutover_audit.py \
            tools/google_cutover_repair.py \
            tools/write_maintenance_marker.py

      - name: Validate required production access
        env:
          VDS_HOST: ${{ secrets.VDS_HOST }}
          VDS_USER: ${{ secrets.VDS_USER }}
          VDS_SSH_KEY: ${{ secrets.VDS_SSH_KEY }}
          VDS_SSH_KNOWN_HOSTS: ${{ secrets.VDS_SSH_KNOWN_HOSTS }}
        run: |
          test -n "$VDS_HOST"
          test -n "$VDS_USER"
          test -n "$VDS_SSH_KEY"
          test -n "$VDS_SSH_KNOWN_HOSTS"

      - name: Install SSH key
        env:
          VDS_SSH_KEY: ${{ secrets.VDS_SSH_KEY }}
          VDS_SSH_KNOWN_HOSTS: ${{ secrets.VDS_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VDS_SSH_KEY" > ~/.ssh/taksklad_repair_key
          chmod 600 ~/.ssh/taksklad_repair_key
          printf '%s\n' "$VDS_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Copy repair bundle to VDS
        env:
          VDS_HOST: ${{ secrets.VDS_HOST }}
          VDS_USER: ${{ secrets.VDS_USER }}
        run: |
          scp -i ~/.ssh/taksklad_repair_key \
            "$RUNNER_TEMP/taksklad-google-return-repair.tar.gz" \
            "$VDS_USER@$VDS_HOST:/tmp/"

      - name: Plan, isolate, backup, repair and audit
        env:
          VDS_HOST: ${{ secrets.VDS_HOST }}
          VDS_USER: ${{ secrets.VDS_USER }}
          VDS_APP_DIR: ${{ secrets.VDS_APP_DIR }}
          EXPECTED_MISSING_SCANS: ${{ inputs.expected_missing_scans }}
          EXPECTED_MISSING_RETURNS: ${{ inputs.expected_missing_returns }}
          REPAIR_APPROVAL: ${{ inputs.approval }}
          EXPECTED_PLAN_SHA: ${{ inputs.expected_plan_sha }}
        run: |
          set -euo pipefail
          remote="$VDS_USER@$VDS_HOST"
          app_dir="${VDS_APP_DIR:-/opt/stacks/taksklad/app}"
          ssh -i ~/.ssh/taksklad_repair_key \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=10 \
            "$remote" 'bash -s' <<EOF
          set -euo pipefail
          app_dir=$(printf '%q' "$app_dir")
          expected_missing_scans=$(printf '%q' "$EXPECTED_MISSING_SCANS")
          expected_missing_returns=$(printf '%q' "$EXPECTED_MISSING_RETURNS")
          repair_approval=$(printf '%q' "$REPAIR_APPROVAL")
          expected_plan_sha=$(printf '%q' "$EXPECTED_PLAN_SHA")
          run_dir="/tmp/taksklad-google-return-repair-${GITHUB_RUN_ID}"
          rm -rf "\$run_dir"
          install -d -m 700 "\$run_dir"
          tar -xzf /tmp/taksklad-google-return-repair.tar.gz -C "\$run_dir" --no-same-owner
          chmod 700 "\$run_dir/deploy/vds/backup_postgres.sh"
          rm -f /tmp/taksklad-google-return-repair-plan.json \
            /tmp/taksklad-google-return-repair-result.json \
            /tmp/taksklad-google-return-repair-audit.json

          compose_project="\$(docker compose --env-file "\$app_dir/deploy/vds/.env" \
            -f "\$app_dir/deploy/vds/docker-compose.yml" config --format json | \
            python3 -c 'import json,sys; value=str((json.load(sys.stdin) or {}).get("name") or "").strip(); assert value; print(value)')"
          mapfile -t backend_ids < <(docker ps -q \
            --filter label=com.docker.compose.project=\$compose_project \
            --filter label=com.docker.compose.service=backend-api)
          test "\${#backend_ids[@]}" -eq 1
          backend_id="\${backend_ids[0]}"

          set +e
          docker exec -i "\$backend_id" python - \
            --plan \
            --expected-missing-scans "\$expected_missing_scans" \
            --expected-missing-returns "\$expected_missing_returns" \
            < "\$run_dir/tools/google_cutover_repair.py" \
            > "\$run_dir/repair-plan.json"
          plan_rc="\$?"
          set -e
          test -s "\$run_dir/repair-plan.json"
          python3 - "\$run_dir/repair-plan.json" "\$expected_missing_scans" "\$expected_missing_returns" "\$plan_rc" \
            /tmp/taksklad-google-return-repair-plan.json "\$expected_plan_sha" <<'PY'
          import json
          import os
          import re
          import sys
          from pathlib import Path

          payload = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          allowed = {
              "schema_version", "mode", "returned_code_occurrences", "already_repaired_occurrences",
              "missing_scan_occurrences", "missing_return_occurrences", "duplicate_occurrences",
              "identity_conflicts", "unparseable_returned_at", "ambiguous_chronology",
              "other_conflicts", "missing_scan_targets", "missing_return_targets", "scan_inserts",
              "outbound_inserts", "return_inserts", "conflicts", "mutations_expected",
              "safe_to_repair", "plan_sha256", "preexisting_anomaly_occurrences",
              "code_owner_conflicts", "divergent_duplicate_targets",
              "legacy_missing_scan_occurrences", "legacy_missing_return_occurrences",
              "legacy_target_occurrences", "legacy_target_unique_codes", "scope_conflicts",
              "prerequisite_return_inserts", "reconstructed_chronology_occurrences",
              "identity_no_strong_id_records", "identity_not_found_records",
              "identity_product_quantity_mismatch_records", "identity_multiple_records",
              "identity_order_not_returned_records",
              "identity_multiple_with_return_codes_records",
              "identity_multiple_unique_scan_owner_records",
              "identity_multiple_unique_row_owner_records",
              "identity_multiple_codes_without_candidate_scan_occurrences",
              "identity_multiple_codes_with_multiple_candidate_scans_occurrences",
              "identity_multiple_codes_split_candidate_records",
              "identity_multiple_pool_size_two_records",
              "identity_multiple_pool_size_three_plus_records",
              "identity_multiple_unique_both_source_ids_records",
              "identity_multiple_unique_source_file_row_records",
              "identity_multiple_single_unique_signal_records",
              "identity_multiple_signal_agreement_records",
              "identity_multiple_signal_conflict_records",
              "identity_multiple_legacy_first_matches_signal_records",
              "identity_multiple_all_candidates_complete_records",
              "identity_multiple_exactly_one_candidate_missing_return_records",
              "identity_multiple_multiple_candidates_missing_return_records",
              "identity_multiple_invalid_lifecycle_records",
              "identity_multiple_source_ids_complete_row_complete_records",
              "identity_multiple_source_ids_missing_row_complete_records",
              "identity_multiple_source_ids_complete_row_missing_records",
              "identity_multiple_source_ids_missing_row_missing_records",
              "identity_multiple_source_row_lifecycle_invalid_records",
              "target_missing_movement_timestamp_occurrences",
              "target_return_crosses_later_movement_occurrences",
              "target_return_crosses_later_re_outbound_other_item_occurrences",
              "target_return_crosses_later_outbound_other_item_occurrences",
              "target_return_crosses_later_available_movement_occurrences",
              "target_return_crosses_later_same_item_movement_occurrences",
              "target_return_crosses_later_other_movement_occurrences",
              "missing_scan_return_boundary_conflict_occurrences",
              "multiple_item_scans_occurrences", "missing_outbound_occurrences",
              "outbound_owner_mismatch_occurrences", "busy_before_missing_scan_occurrences",
              "scan_without_outbound_occurrences", "scanned_blocks_exceed_plan_occurrences",
              "return_reference_too_long_occurrences", "returned_by_too_long_occurrences",
              "code_owner_conflict_both_items_have_scan_occurrences",
              "code_owner_conflict_only_first_item_has_scan_occurrences",
              "code_owner_conflict_only_current_item_has_scan_occurrences",
              "code_owner_conflict_neither_item_has_scan_occurrences",
              "code_owner_conflict_both_complete_occurrences",
              "code_owner_conflict_first_complete_current_missing_return_occurrences",
              "code_owner_conflict_first_missing_return_current_complete_occurrences",
              "code_owner_conflict_both_missing_return_occurrences",
              "code_owner_conflict_invalid_lifecycle_occurrences",
              "busy_previous_outbound_occurrences", "busy_previous_re_outbound_occurrences",
              "busy_previous_owner_order_returned_occurrences",
              "busy_previous_owner_matches_both_source_ids_occurrences",
              "busy_previous_owner_matches_google_row_occurrences",
              "busy_previous_owner_product_quantity_match_occurrences",
              "busy_previous_owner_scan_matches_movement_occurrences",
              "cross_later_backend_timestamp_in_interval_occurrences",
              "cross_later_google_timestamp_in_interval_occurrences",
              "cross_later_unique_audit_timestamp_in_interval_occurrences",
              "cross_later_no_trusted_timestamp_in_interval_occurrences",
              "cross_later_one_unique_trusted_timestamp_in_interval_occurrences",
              "cross_later_multiple_trusted_timestamps_in_interval_occurrences",
              "cross_later_all_trusted_timestamps_agree_occurrences",
          }
          if set(payload) - allowed:
              raise SystemExit("GOOGLE_RETURN_REPAIR_PLAN_UNSAFE_FIELDS")
          evidence = {key: payload[key] for key in sorted(allowed) if key in payload}
          fd = os.open(sys.argv[5], os.O_WRONLY | os.O_CREAT | os.O_EXCL, 0o600)
          with os.fdopen(fd, "w", encoding="utf-8") as handle:
              json.dump(evidence, handle, sort_keys=True)
              handle.write("\n")
          print(
              "GOOGLE_RETURN_REPAIR_PLAN_COUNTS "
              f"missing_scan_occurrences={payload.get('missing_scan_occurrences', -1)} "
              f"missing_return_occurrences={payload.get('missing_return_occurrences', -1)} "
              f"missing_scan_targets={payload.get('missing_scan_targets', -1)} "
              f"missing_return_targets={payload.get('missing_return_targets', -1)} "
              f"legacy_targets={payload.get('legacy_target_occurrences', -1)} "
              f"legacy_unique_codes={payload.get('legacy_target_unique_codes', -1)} "
              f"prerequisite_returns={payload.get('prerequisite_return_inserts', -1)} "
              f"reconstructed_chronology={payload.get('reconstructed_chronology_occurrences', -1)} "
              f"duplicates={payload.get('duplicate_occurrences', -1)} "
              f"identity_conflicts={payload.get('identity_conflicts', -1)} "
              f"identity_no_strong_id={payload.get('identity_no_strong_id_records', -1)} "
              f"identity_not_found={payload.get('identity_not_found_records', -1)} "
              f"identity_product_quantity_mismatch={payload.get('identity_product_quantity_mismatch_records', -1)} "
              f"identity_multiple={payload.get('identity_multiple_records', -1)} "
              f"identity_multiple_unique_scan_owner={payload.get('identity_multiple_unique_scan_owner_records', -1)} "
              f"identity_multiple_unique_row_owner={payload.get('identity_multiple_unique_row_owner_records', -1)} "
              f"identity_multiple_codes_without_candidate_scan={payload.get('identity_multiple_codes_without_candidate_scan_occurrences', -1)} "
              f"identity_multiple_codes_with_multiple_candidate_scans={payload.get('identity_multiple_codes_with_multiple_candidate_scans_occurrences', -1)} "
              f"identity_multiple_codes_split_candidate={payload.get('identity_multiple_codes_split_candidate_records', -1)} "
              f"identity_multiple_pool_two={payload.get('identity_multiple_pool_size_two_records', -1)} "
              f"identity_multiple_pool_three_plus={payload.get('identity_multiple_pool_size_three_plus_records', -1)} "
              f"identity_multiple_unique_both_source_ids={payload.get('identity_multiple_unique_both_source_ids_records', -1)} "
              f"identity_multiple_unique_source_file_row={payload.get('identity_multiple_unique_source_file_row_records', -1)} "
              f"identity_multiple_single_unique_signal={payload.get('identity_multiple_single_unique_signal_records', -1)} "
              f"identity_multiple_signal_agreement={payload.get('identity_multiple_signal_agreement_records', -1)} "
              f"identity_multiple_signal_conflict={payload.get('identity_multiple_signal_conflict_records', -1)} "
              f"identity_multiple_legacy_first_matches_signal={payload.get('identity_multiple_legacy_first_matches_signal_records', -1)} "
              f"identity_multiple_all_complete={payload.get('identity_multiple_all_candidates_complete_records', -1)} "
              f"identity_multiple_one_missing_return={payload.get('identity_multiple_exactly_one_candidate_missing_return_records', -1)} "
              f"identity_multiple_many_missing_return={payload.get('identity_multiple_multiple_candidates_missing_return_records', -1)} "
              f"identity_multiple_invalid_lifecycle={payload.get('identity_multiple_invalid_lifecycle_records', -1)} "
              f"identity_order_not_returned={payload.get('identity_order_not_returned_records', -1)} "
              f"unparseable_returned_at={payload.get('unparseable_returned_at', -1)} "
              f"ambiguous_chronology={payload.get('ambiguous_chronology', -1)} "
              f"target_missing_movement_timestamp={payload.get('target_missing_movement_timestamp_occurrences', -1)} "
              f"target_return_crosses_later_movement={payload.get('target_return_crosses_later_movement_occurrences', -1)} "
              f"crosses_later_re_outbound_other_item={payload.get('target_return_crosses_later_re_outbound_other_item_occurrences', -1)} "
              f"crosses_later_outbound_other_item={payload.get('target_return_crosses_later_outbound_other_item_occurrences', -1)} "
              f"crosses_later_available_movement={payload.get('target_return_crosses_later_available_movement_occurrences', -1)} "
              f"crosses_later_same_item={payload.get('target_return_crosses_later_same_item_movement_occurrences', -1)} "
              f"crosses_later_other_movement={payload.get('target_return_crosses_later_other_movement_occurrences', -1)} "
              f"missing_scan_return_boundary_conflict={payload.get('missing_scan_return_boundary_conflict_occurrences', -1)} "
              f"other_conflicts={payload.get('other_conflicts', -1)} "
              f"missing_outbound={payload.get('missing_outbound_occurrences', -1)} "
              f"outbound_owner_mismatch={payload.get('outbound_owner_mismatch_occurrences', -1)} "
              f"code_owner_both_have_scan={payload.get('code_owner_conflict_both_items_have_scan_occurrences', -1)} "
              f"code_owner_only_first_has_scan={payload.get('code_owner_conflict_only_first_item_has_scan_occurrences', -1)} "
              f"code_owner_only_current_has_scan={payload.get('code_owner_conflict_only_current_item_has_scan_occurrences', -1)} "
              f"code_owner_neither_has_scan={payload.get('code_owner_conflict_neither_item_has_scan_occurrences', -1)} "
              f"code_owner_both_complete={payload.get('code_owner_conflict_both_complete_occurrences', -1)} "
              f"code_owner_first_complete_current_missing={payload.get('code_owner_conflict_first_complete_current_missing_return_occurrences', -1)} "
              f"code_owner_first_missing_current_complete={payload.get('code_owner_conflict_first_missing_return_current_complete_occurrences', -1)} "
              f"code_owner_both_missing={payload.get('code_owner_conflict_both_missing_return_occurrences', -1)} "
              f"code_owner_invalid_lifecycle={payload.get('code_owner_conflict_invalid_lifecycle_occurrences', -1)} "
              f"busy_prev_outbound={payload.get('busy_previous_outbound_occurrences', -1)} "
              f"busy_prev_re_outbound={payload.get('busy_previous_re_outbound_occurrences', -1)} "
              f"busy_prev_owner_returned={payload.get('busy_previous_owner_order_returned_occurrences', -1)} "
              f"busy_prev_owner_both_ids={payload.get('busy_previous_owner_matches_both_source_ids_occurrences', -1)} "
              f"busy_prev_owner_row={payload.get('busy_previous_owner_matches_google_row_occurrences', -1)} "
              f"cross_backend_in_interval={payload.get('cross_later_backend_timestamp_in_interval_occurrences', -1)} "
              f"cross_google_in_interval={payload.get('cross_later_google_timestamp_in_interval_occurrences', -1)} "
              f"cross_audit_in_interval={payload.get('cross_later_unique_audit_timestamp_in_interval_occurrences', -1)} "
              f"cross_no_trusted_time={payload.get('cross_later_no_trusted_timestamp_in_interval_occurrences', -1)} "
              f"preexisting_anomalies={payload.get('preexisting_anomaly_occurrences', -1)} "
              f"conflicts={payload.get('conflicts', -1)} values_redacted=1"
          )
          if int(sys.argv[4]) != 0 or payload.get("safe_to_repair") is not True or payload.get("conflicts") != 0:
              raise SystemExit("GOOGLE_RETURN_REPAIR_PLAN_BLOCKED")
          if payload.get("missing_scan_occurrences") != int(sys.argv[2]):
              raise SystemExit("GOOGLE_RETURN_REPAIR_MISSING_SCAN_COUNT_CHANGED")
          if payload.get("missing_return_occurrences") != int(sys.argv[3]):
              raise SystemExit("GOOGLE_RETURN_REPAIR_MISSING_RETURN_COUNT_CHANGED")
          if payload.get("legacy_target_occurrences") != 29:
              raise SystemExit("GOOGLE_RETURN_REPAIR_TARGET_COUNT_CHANGED")
          if payload.get("legacy_target_unique_codes") != 29:
              raise SystemExit("GOOGLE_RETURN_REPAIR_UNIQUE_CODE_COUNT_CHANGED")
          if payload.get("prerequisite_return_inserts") != 7:
              raise SystemExit("GOOGLE_RETURN_REPAIR_PREREQUISITE_COUNT_CHANGED")
          if payload.get("reconstructed_chronology_occurrences") != 5:
              raise SystemExit("GOOGLE_RETURN_REPAIR_CHRONOLOGY_COUNT_CHANGED")
          if not re.fullmatch(r"[0-9a-f]{64}", str(payload.get("plan_sha256") or "")):
              raise SystemExit("GOOGLE_RETURN_REPAIR_PLAN_SHA_REQUIRED")
          if not sys.argv[6]:
              raise SystemExit("GOOGLE_RETURN_REPAIR_EXPECTED_PLAN_SHA_REQUIRED")
          if payload.get("plan_sha256") != sys.argv[6]:
              raise SystemExit("GOOGLE_RETURN_REPAIR_EXPECTED_PLAN_SHA_MISMATCH")
          print("GOOGLE_RETURN_REPAIR_PLAN_OK values_redacted=1")
          PY
          plan_sha="\$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["plan_sha256"])' "\$run_dir/repair-plan.json")"

          service_names=(backend-api frontend telegram-worker skladbot-worker smartup-auto-import-worker google-sheets-sync-worker)
          writer_ids=()
          for service in "\${service_names[@]}"; do
            mapfile -t service_ids < <(docker ps -q \
              --filter label=com.docker.compose.project=\$compose_project \
              --filter label=com.docker.compose.service=\$service)
            test "\${#service_ids[@]}" -eq 1
            writer_ids+=("\${service_ids[0]}")
          done
          test "\${writer_ids[0]}" = "\$backend_id"
          internal_network="\${compose_project}_taksklad-internal"
          docker network inspect "\$internal_network" >/dev/null
          legacy_image="\$(docker inspect --format '{{.Image}}' "\$backend_id")"
          test -n "\$legacy_image"
          legacy_env_file="\$run_dir/legacy-backend.env"
          legacy_env_json="\$run_dir/legacy-backend-env.json"
          cleanup_legacy_env() {
            rm -f "\$legacy_env_file" "\$legacy_env_json"
          }
          trap cleanup_legacy_env EXIT
          docker inspect --format '{{json .Config.Env}}' "\$backend_id" > "\$legacy_env_json"
          chmod 600 "\$legacy_env_json"
          python3 - "\$legacy_env_json" "\$legacy_env_file" <<'PY'
          import json
          import os
          import sys

          with open(sys.argv[1], encoding="utf-8") as source:
              values = json.load(source)
          path = sys.argv[2]
          fd = os.open(path, os.O_WRONLY | os.O_CREAT | os.O_EXCL, 0o600)
          with os.fdopen(fd, "w", encoding="utf-8") as handle:
              for value in values:
                  if "\n" in value or "\r" in value:
                      raise SystemExit("LEGACY_ENV_MULTILINE_VALUE_FORBIDDEN")
                  handle.write(value + "\n")
          PY
          rm -f "\$legacy_env_json"
          run_legacy_script() {
            script_path="\$1"
            shift
            docker run --rm \
              --network "\$internal_network" \
              --env-file "\$legacy_env_file" \
              --read-only --cap-drop ALL --security-opt no-new-privileges:true \
              --tmpfs /tmp:rw,noexec,nosuid,nodev,size=64m \
              --pids-limit 256 --memory 768m --cpus 1.0 \
              "\$legacy_image" python - "\$@" < "\$script_path"
          }
          isolation_active=0
          repair_committed=0
          restore_legacy_runtime() {
            set +e
            if test "\$isolation_active" = 1; then
              if test "\${#writer_ids[@]}" -gt 0; then
                docker start "\${writer_ids[@]}" >/dev/null
              fi
            fi
            set -e
          }
          stop_legacy_runtime() {
            set +e
            if test "\${#writer_ids[@]}" -gt 0; then
              docker stop -t 45 "\${writer_ids[@]}" >/dev/null
            fi
            set -e
          }
          repair_exit() {
            rc="\$?"
            if test "\$isolation_active" = 1; then
              if test "\$repair_committed" = 0; then
                restore_legacy_runtime
              else
                stop_legacy_runtime
                echo "GOOGLE_RETURN_REPAIR_POST_COMMIT_FAILURE_LEFT_IN_MAINTENANCE" >&2
              fi
            fi
            cleanup_legacy_env
            exit "\$rc"
          }
          trap repair_exit EXIT

          isolation_active=1
          docker stop -t 45 "\${writer_ids[@]}" >/dev/null
          for writer_id in "\${writer_ids[@]}"; do
            test "\$(docker inspect --format '{{.State.Running}}' "\$writer_id")" = false
          done
          for service in "\${service_names[@]}"; do
            test -z "\$(docker ps -q \
              --filter label=com.docker.compose.project=\$compose_project \
              --filter label=com.docker.compose.service=\$service)"
          done
          echo "GOOGLE_RETURN_REPAIR_WRITER_DRAIN_OK stopped=\${#writer_ids[@]} backend_running=0"

          TAKSKLAD_ENV_FILE="\$app_dir/deploy/vds/.env" \
          TAKSKLAD_COMPOSE_FILE="\$run_dir/deploy/vds/docker-compose.yml" \
          TAKSKLAD_MAINTENANCE_MARKER=/run/taksklad-observability/maintenance.json \
            "\$run_dir/deploy/vds/backup_postgres.sh" --no-prune </dev/null

          repair_committed=1
          run_legacy_script "\$run_dir/tools/google_cutover_repair.py" \
            --apply \
            --approval "\$repair_approval" \
            --expected-plan-sha "\$plan_sha" \
            --expected-missing-scans "\$expected_missing_scans" \
            --expected-missing-returns "\$expected_missing_returns" \
            > "\$run_dir/repair-result.json"
          python3 - "\$run_dir/repair-result.json" "\$run_dir/repair-plan.json" "\$plan_sha" <<'PY'
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          plan = json.loads(Path(sys.argv[2]).read_text(encoding="utf-8"))
          allowed = {
              "schema_version", "mode", "safe_to_repair", "plan_sha256", "conflicts",
              "scan_inserts", "outbound_inserts", "return_inserts", "mutations_applied",
          }
          if set(payload) - allowed:
              raise SystemExit("GOOGLE_RETURN_REPAIR_RESULT_UNSAFE_FIELDS")
          if payload.get("safe_to_repair") is not True or payload.get("conflicts") != 0:
              raise SystemExit("GOOGLE_RETURN_REPAIR_APPLY_BLOCKED")
          if payload.get("plan_sha256") != sys.argv[3]:
              raise SystemExit("GOOGLE_RETURN_REPAIR_APPLY_SHA_MISMATCH")
          for field in ("scan_inserts", "outbound_inserts", "return_inserts"):
              if payload.get(field) != plan.get(field):
                  raise SystemExit("GOOGLE_RETURN_REPAIR_APPLY_MUTATION_COUNT_MISMATCH")
          print(
              "GOOGLE_RETURN_REPAIR_APPLY_OK "
              f"scan_inserts={payload['scan_inserts']} outbound_inserts={payload['outbound_inserts']} "
              f"return_inserts={payload['return_inserts']} values_redacted=1"
          )
          PY
          install -m 600 "\$run_dir/repair-result.json" /tmp/taksklad-google-return-repair-result.json

          run_legacy_script "\$run_dir/tools/google_cutover_audit.py" \
            > "\$run_dir/final-audit.json"
          python3 - "\$run_dir/final-audit.json" <<'PY'
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          if payload.get("safe_to_cutover") is not True or payload.get("blockers") != 0:
              raise SystemExit("GOOGLE_RETURN_REPAIR_FINAL_AUDIT_BLOCKED")
          print(
              "GOOGLE_RETURN_REPAIR_FINAL_AUDIT_OK "
              f"records={payload['records_total']} active={payload['active_records']} "
              f"returned={payload['returned_records']} blockers=0 values_redacted=1"
          )
          PY
          install -m 600 "\$run_dir/final-audit.json" /tmp/taksklad-google-return-repair-audit.json

          restore_legacy_runtime
          for attempt in \$(seq 1 48); do
            healthy=1
            for writer_id in "\${writer_ids[@]}"; do
              status="\$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "\$writer_id")"
              if test "\$status" != healthy && test "\$status" != running; then
                healthy=0
              fi
            done
            if test "\$healthy" = 1; then
              echo "GOOGLE_RETURN_REPAIR_LEGACY_RUNTIME_RESTORED_OK services=\${#writer_ids[@]}"
              break
            fi
            if test "\$attempt" = 48; then
              echo "GOOGLE_RETURN_REPAIR_LEGACY_RUNTIME_RESTORE_TIMEOUT" >&2
              exit 1
            fi
            sleep 5
          done
          python3 - <<'PY'
          import json
          import time
          from urllib.request import urlopen

          for attempt in range(30):
              try:
                  with urlopen("https://api.taksklad.uz/ready", timeout=10) as response:
                      payload = json.load(response)
                  if response.status == 200 and payload.get("ready") is True:
                      print("GOOGLE_RETURN_REPAIR_SERVER_PUBLIC_RUNTIME_OK")
                      raise SystemExit(0)
              except Exception:
                  if attempt == 29:
                      raise
              time.sleep(2)
          raise SystemExit("GOOGLE_RETURN_REPAIR_SERVER_PUBLIC_RUNTIME_TIMEOUT")
          PY
          isolation_active=0
          cleanup_legacy_env
          trap - EXIT
          EOF

      - name: Verify public legacy runtime restored
        run: |
          python3 - <<'PY'
          import json
          import time
          from urllib.request import urlopen

          for attempt in range(30):
              try:
                  with urlopen("https://api.taksklad.uz/ready", timeout=10) as response:
                      payload = json.load(response)
                  if response.status == 200 and payload.get("ready") is True:
                      print("GOOGLE_RETURN_REPAIR_PUBLIC_RUNTIME_OK")
                      raise SystemExit(0)
              except Exception:
                  if attempt == 29:
                      raise
              time.sleep(2)
          raise SystemExit("GOOGLE_RETURN_REPAIR_PUBLIC_RUNTIME_TIMEOUT")
          PY

      - name: Collect sanitized repair evidence
        if: always()
        env:
          VDS_HOST: ${{ secrets.VDS_HOST }}
          VDS_USER: ${{ secrets.VDS_USER }}
        run: |
          set -euo pipefail
          evidence_dir="$RUNNER_TEMP/google-return-repair-evidence"
          mkdir -p "$evidence_dir"
          for name in plan result audit; do
            scp -i ~/.ssh/taksklad_repair_key \
              "$VDS_USER@$VDS_HOST:/tmp/taksklad-google-return-repair-$name.json" \
              "$evidence_dir/$name.json" || true
          done
          test -f "$evidence_dir/plan.json"

      - name: Upload sanitized repair evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: taksklad-google-return-repair-evidence
          path: ${{ runner.temp }}/google-return-repair-evidence
          if-no-files-found: error
          retention-days: 14

name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      artifact_run_id:
        description: Successful Build Immutable Release workflow run ID
        required: true
      source_sha:
        description: Exact 40-character release commit SHA
        required: true
      manifest_sha256:
        description: Expected SHA256 of the attested release.json
        required: true

permissions:
  actions: read
  attestations: read
  contents: read

concurrency:
  group: taksklad-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Production deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    steps:
      - name: Download and verify immutable release manifest
        env:
          ARTIFACT_RUN_ID: ${{ inputs.artifact_run_id }}
          EXPECTED_MANIFEST_SHA256: ${{ inputs.manifest_sha256 }}
          EXPECTED_SOURCE_SHA: ${{ inputs.source_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          [[ "$ARTIFACT_RUN_ID" =~ ^[1-9][0-9]*$ ]] || {
            echo "IMMUTABLE_ARTIFACT_RUN_ID_REQUIRED" >&2
            exit 1
          }
          [[ "$EXPECTED_SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo "IMMUTABLE_SOURCE_SHA_REQUIRED" >&2
            exit 1
          }
          [[ "$EXPECTED_MANIFEST_SHA256" =~ ^[0-9a-f]{64}$ ]] || {
            echo "IMMUTABLE_RELEASE_MANIFEST_SHA256_REQUIRED" >&2
            exit 1
          }

          run_metadata="$RUNNER_TEMP/release-run.json"
          gh run view "$ARTIFACT_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --json conclusion,workflowName > "$run_metadata"
          python3 - "$run_metadata" <<'PY'
          import json
          import sys
          from pathlib import Path

          metadata = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          if metadata.get("workflowName") != "Build Immutable Release":
              raise SystemExit("UNVERIFIED_RELEASE_WORKFLOW")
          if metadata.get("conclusion") != "success":
              raise SystemExit("RELEASE_WORKFLOW_NOT_SUCCESSFUL")
          PY

          manifest_dir="$RUNNER_TEMP/release-manifest"
          mkdir -p "$manifest_dir"
          gh run download "$ARTIFACT_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name taksklad-release-manifest \
            --dir "$manifest_dir"
          manifest_path="$manifest_dir/release.json"
          [[ -f "$manifest_path" ]] || {
            echo "RELEASE_MANIFEST_NOT_FOUND" >&2
            exit 1
          }
          actual_manifest_sha256="$(sha256sum "$manifest_path" | awk '{print $1}')"
          [[ "$actual_manifest_sha256" == "$EXPECTED_MANIFEST_SHA256" ]] || {
            echo "RELEASE_MANIFEST_SHA256_MISMATCH" >&2
            exit 1
          }
          gh attestation verify "$manifest_path" --repo "$GITHUB_REPOSITORY"

          python3 - "$manifest_path" "$ARTIFACT_RUN_ID" "$EXPECTED_SOURCE_SHA" <<'PY'
          import json
          import re
          import sys
          from pathlib import Path

          manifest = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          if manifest.get("schema_version") != 1:
              raise SystemExit("UNSUPPORTED_RELEASE_MANIFEST_SCHEMA")
          if manifest.get("artifact_run_id") != int(sys.argv[2]):
              raise SystemExit("RELEASE_MANIFEST_RUN_ID_MISMATCH")
          if manifest.get("source_sha") != sys.argv[3]:
              raise SystemExit("RELEASE_MANIFEST_SOURCE_SHA_MISMATCH")
          if (manifest.get("deployment_policy") or {}).get("acceptance") != "required":
              raise SystemExit("RELEASE_ACCEPTANCE_MUST_REMAIN_REQUIRED")
          if (manifest.get("deployment_policy") or {}).get("build_on_target") is not False:
              raise SystemExit("SOURCE_BUILD_DEPLOYMENT_FORBIDDEN")
          for service in ("backend", "frontend"):
              image = (manifest.get("images") or {}).get(service) or {}
              digest = str(image.get("digest") or "")
              reference = str(image.get("reference") or "")
              if not re.fullmatch(r"sha256:[0-9a-f]{64}", digest):
                  raise SystemExit(f"IMMUTABLE_{service.upper()}_DIGEST_REQUIRED")
              if reference != f"{image.get('name')}@{digest}":
                  raise SystemExit(f"IMMUTABLE_{service.upper()}_REFERENCE_REQUIRED")
          PY
          printf 'RELEASE_MANIFEST_PATH=%s\n' "$manifest_path" >> "$GITHUB_ENV"

      - name: Checkout exact verified release SHA
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.source_sha }}
          persist-credentials: false

      - name: Validate deploy script syntax
        run: bash -n deploy/vds/deploy_from_git.sh

      - name: Validate required secrets
        env:
          VDS_HOST: ${{ secrets.VDS_HOST }}
          VDS_USER: ${{ secrets.VDS_USER }}
          VDS_SSH_KEY: ${{ secrets.VDS_SSH_KEY }}
          VDS_SSH_KNOWN_HOSTS: ${{ secrets.VDS_SSH_KNOWN_HOSTS }}
        run: |
          test -n "$VDS_HOST"
          test -n "$VDS_USER"
          test -n "$VDS_SSH_KEY"
          test -n "$VDS_SSH_KNOWN_HOSTS"

      - name: Install SSH key
        env:
          VDS_SSH_KEY: ${{ secrets.VDS_SSH_KEY }}
          VDS_SSH_KNOWN_HOSTS: ${{ secrets.VDS_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VDS_SSH_KEY" > ~/.ssh/taksklad_deploy_key
          chmod 600 ~/.ssh/taksklad_deploy_key
          printf '%s\n' "$VDS_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Copy deploy script and verified manifest to VDS
        env:
          VDS_HOST: ${{ secrets.VDS_HOST }}
          VDS_USER: ${{ secrets.VDS_USER }}
        run: |
          scp -i ~/.ssh/taksklad_deploy_key \
            deploy/vds/deploy_from_git.sh \
            "$RELEASE_MANIFEST_PATH" \
            "$VDS_USER@$VDS_HOST:/tmp/"

      - name: Deploy on VDS
        env:
          VDS_HOST: ${{ secrets.VDS_HOST }}
          VDS_USER: ${{ secrets.VDS_USER }}
          VDS_APP_DIR: ${{ secrets.VDS_APP_DIR }}
          DEPLOY_ACCEPTANCE: required
        run: |
          app_dir="${VDS_APP_DIR:-/opt/stacks/taksklad/app}"
          remote="$VDS_USER@$VDS_HOST"
          ssh -i ~/.ssh/taksklad_deploy_key "$remote" 'bash -s' <<EOF
          set -euo pipefail
          export TAKSKLAD_DEPLOY_APP_DIR=$(printf '%q' "$app_dir")
          export TAKSKLAD_DEPLOY_ACCEPTANCE=$(printf '%q' "$DEPLOY_ACCEPTANCE")
          chmod +x /tmp/deploy_from_git.sh
          /tmp/deploy_from_git.sh --artifact-manifest /tmp/release.json
          EOF

name: Deploy Production

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy from origin
        required: true
        default: main
      services:
        description: Compose services to rebuild/recreate, or all
        required: true
        default: all
      acceptance:
        description: Run acceptance_status.sh mode
        required: true
        default: optional
        type: choice
        options:
          - optional
          - required
          - skip

permissions:
  contents: read

concurrency:
  group: taksklad-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Production deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Local deploy preflight
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r backend/requirements.txt
          PYTHONPATH=. python -m compileall -q backend/app backend/migrations deploy/vds tools tests
          PYTHONPATH=. python -m alembic -c backend/alembic.ini heads
          for script in deploy/vds/*.sh; do
            bash -n "$script"
          done
          TAKSKLAD_ENV_FILE=.env.example docker compose --env-file deploy/vds/.env.example -f deploy/vds/docker-compose.yml config --quiet
          npm ci --prefix frontend
          npm --prefix frontend run build

      - name: Validate required secrets
        env:
          VDS_HOST: ${{ secrets.VDS_HOST }}
          VDS_USER: ${{ secrets.VDS_USER }}
          VDS_SSH_KEY: ${{ secrets.VDS_SSH_KEY }}
          VDS_SSH_KNOWN_HOSTS: ${{ secrets.VDS_SSH_KNOWN_HOSTS }}
        run: |
          test -n "$VDS_HOST"
          test -n "$VDS_USER"
          test -n "$VDS_SSH_KEY"
          test -n "$VDS_SSH_KNOWN_HOSTS"

      - name: Install SSH key
        env:
          VDS_SSH_KEY: ${{ secrets.VDS_SSH_KEY }}
          VDS_SSH_KNOWN_HOSTS: ${{ secrets.VDS_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VDS_SSH_KEY" > ~/.ssh/taksklad_deploy_key
          chmod 600 ~/.ssh/taksklad_deploy_key
          printf '%s\n' "$VDS_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Copy deploy script to VDS
        env:
          VDS_HOST: ${{ secrets.VDS_HOST }}
          VDS_USER: ${{ secrets.VDS_USER }}
        run: |
          scp -i ~/.ssh/taksklad_deploy_key deploy/vds/deploy_from_git.sh \
            "$VDS_USER@$VDS_HOST:/tmp/taksklad-deploy-from-git.sh"

      - name: Deploy on VDS
        env:
          VDS_HOST: ${{ secrets.VDS_HOST }}
          VDS_USER: ${{ secrets.VDS_USER }}
          VDS_APP_DIR: ${{ secrets.VDS_APP_DIR }}
          DEPLOY_REF: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.ref }}
          DEPLOY_SERVICES: ${{ github.event_name == 'workflow_run' && 'all' || inputs.services }}
          DEPLOY_ACCEPTANCE: ${{ github.event_name == 'workflow_run' && 'optional' || inputs.acceptance }}
        run: |
          app_dir="${VDS_APP_DIR:-/opt/stacks/taksklad/app}"
          remote="$VDS_USER@$VDS_HOST"
          ssh -i ~/.ssh/taksklad_deploy_key "$remote" 'bash -s' <<EOF
          set -euo pipefail
          export TAKSKLAD_DEPLOY_APP_DIR=$(printf '%q' "$app_dir")
          export TAKSKLAD_DEPLOY_REF=$(printf '%q' "$DEPLOY_REF")
          export TAKSKLAD_DEPLOY_SERVICES=$(printf '%q' "$DEPLOY_SERVICES")
          export TAKSKLAD_DEPLOY_ACCEPTANCE=$(printf '%q' "$DEPLOY_ACCEPTANCE")
          chmod +x /tmp/taksklad-deploy-from-git.sh
          /tmp/taksklad-deploy-from-git.sh
          EOF

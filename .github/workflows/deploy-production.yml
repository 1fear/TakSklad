name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      artifact_run_id:
        description: Successful Build Immutable Release workflow run ID
        required: true
      source_sha:
        description: Exact 40-character release commit SHA
        required: true
      manifest_sha256:
        description: Expected SHA256 of the attested release.json
        required: true

permissions:
  actions: read
  attestations: read
  contents: read
  packages: read

concurrency:
  group: taksklad-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Production deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    steps:
      - name: Download and verify immutable release manifest
        env:
          ARTIFACT_RUN_ID: ${{ inputs.artifact_run_id }}
          EXPECTED_MANIFEST_SHA256: ${{ inputs.manifest_sha256 }}
          EXPECTED_SOURCE_SHA: ${{ inputs.source_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          [[ "$ARTIFACT_RUN_ID" =~ ^[1-9][0-9]*$ ]] || {
            echo "IMMUTABLE_ARTIFACT_RUN_ID_REQUIRED" >&2
            exit 1
          }
          [[ "$EXPECTED_SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo "IMMUTABLE_SOURCE_SHA_REQUIRED" >&2
            exit 1
          }
          [[ "$EXPECTED_MANIFEST_SHA256" =~ ^[0-9a-f]{64}$ ]] || {
            echo "IMMUTABLE_RELEASE_MANIFEST_SHA256_REQUIRED" >&2
            exit 1
          }

          run_metadata="$RUNNER_TEMP/release-run.json"
          gh run view "$ARTIFACT_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --json conclusion,event,headSha,workflowName > "$run_metadata"
          python3 - "$run_metadata" "$EXPECTED_SOURCE_SHA" <<'PY'
          import json
          import sys
          from pathlib import Path

          metadata = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          if metadata.get("workflowName") != "Build Immutable Release":
              raise SystemExit("UNVERIFIED_RELEASE_WORKFLOW")
          if metadata.get("conclusion") != "success":
              raise SystemExit("RELEASE_WORKFLOW_NOT_SUCCESSFUL")
          if metadata.get("event") != "workflow_dispatch":
              raise SystemExit("UNVERIFIED_RELEASE_EVENT")
          if metadata.get("headSha") != sys.argv[2]:
              raise SystemExit("RELEASE_WORKFLOW_SOURCE_SHA_MISMATCH")
          PY

          manifest_dir="$RUNNER_TEMP/release-manifest"
          mkdir -p "$manifest_dir"
          gh run download "$ARTIFACT_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name taksklad-release-manifest \
            --dir "$manifest_dir"
          manifest_path="$manifest_dir/release.json"
          [[ -f "$manifest_path" ]] || {
            echo "RELEASE_MANIFEST_NOT_FOUND" >&2
            exit 1
          }
          actual_manifest_sha256="$(sha256sum "$manifest_path" | awk '{print $1}')"
          [[ "$actual_manifest_sha256" == "$EXPECTED_MANIFEST_SHA256" ]] || {
            echo "RELEASE_MANIFEST_SHA256_MISMATCH" >&2
            exit 1
          }
          signer_workflow="github.com/$GITHUB_REPOSITORY/.github/workflows/build-windows-release.yml"
          gh attestation verify "$manifest_path" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$signer_workflow" \
            --source-digest "$EXPECTED_SOURCE_SHA"

          python3 - "$manifest_path" "$ARTIFACT_RUN_ID" "$EXPECTED_SOURCE_SHA" "$GITHUB_REPOSITORY" <<'PY'
          import json
          import re
          import sys
          from pathlib import Path

          manifest = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          if manifest.get("schema_version") != 1:
              raise SystemExit("UNSUPPORTED_RELEASE_MANIFEST_SCHEMA")
          if manifest.get("artifact_run_id") != int(sys.argv[2]):
              raise SystemExit("RELEASE_MANIFEST_RUN_ID_MISMATCH")
          if manifest.get("source_sha") != sys.argv[3]:
              raise SystemExit("RELEASE_MANIFEST_SOURCE_SHA_MISMATCH")
          if manifest.get("authority") != "github-sigstore" or manifest.get("deployable") is not True:
              raise SystemExit("PRODUCTION_RELEASE_MANIFEST_REQUIRED")
          windows = manifest.get("windows") or {}
          version = str(windows.get("version") or "")
          release_tag = str(manifest.get("release_tag") or "")
          if not re.fullmatch(r"[0-9]+\.[0-9]+\.[0-9]+(?:[-+][0-9A-Za-z.-]+)?", version):
              raise SystemExit("IMMUTABLE_RELEASE_VERSION_REQUIRED")
          if release_tag != f"v{version}":
              raise SystemExit("IMMUTABLE_RELEASE_TAG_VERSION_MISMATCH")
          ci = manifest.get("ci") or {}
          if ci.get("workflow") != "CI" or ci.get("required_check") != "Release gate":
              raise SystemExit("UNVERIFIED_CI_RELEASE_GATE")
          if ci.get("event") != "push" or ci.get("head_branch") != "main":
              raise SystemExit("CI_MAIN_PUSH_REQUIRED")
          if ci.get("conclusion") != "success" or ci.get("head_sha") != sys.argv[3]:
              raise SystemExit("CI_SOURCE_SHA_MISMATCH")
          if not isinstance(ci.get("run_id"), int) or ci["run_id"] <= 0:
              raise SystemExit("IMMUTABLE_CI_RUN_ID_REQUIRED")
          if (manifest.get("deployment_policy") or {}).get("acceptance") != "required":
              raise SystemExit("RELEASE_ACCEPTANCE_MUST_REMAIN_REQUIRED")
          if (manifest.get("deployment_policy") or {}).get("build_on_target") is not False:
              raise SystemExit("SOURCE_BUILD_DEPLOYMENT_FORBIDDEN")
          for service in ("backend", "frontend"):
              image = (manifest.get("images") or {}).get(service) or {}
              digest = str(image.get("digest") or "")
              reference = str(image.get("reference") or "")
              expected_name = f"ghcr.io/{sys.argv[4].split('/', 1)[0]}/taksklad-{service}"
              if not re.fullmatch(r"sha256:[0-9a-f]{64}", digest):
                  raise SystemExit(f"IMMUTABLE_{service.upper()}_DIGEST_REQUIRED")
              if image.get("name") != expected_name or reference != f"{expected_name}@{digest}":
                  raise SystemExit(f"IMMUTABLE_{service.upper()}_REFERENCE_REQUIRED")

          hash_re = re.compile(r"^[0-9a-f]{64}$")
          expected_windows = {
              "TakSklad.exe": windows.get("artifact_sha256"),
              "TakSklad-windows-x64.zip": windows.get("artifact_sha256_onedir"),
              "version.json": windows.get("manifest_sha256"),
          }
          if windows.get("artifact") != "TakSklad.exe" or windows.get("artifact_onedir") != "TakSklad-windows-x64.zip" or windows.get("manifest") != "version.json":
              raise SystemExit("IMMUTABLE_WINDOWS_SUBJECT_NAMES_REQUIRED")
          if any(not hash_re.fullmatch(str(value or "")) for value in expected_windows.values()):
              raise SystemExit("IMMUTABLE_WINDOWS_SUBJECT_HASH_REQUIRED")
          subjects = manifest.get("attestation_subjects") or []
          windows_subjects = {
              item.get("name"): item.get("sha256")
              for item in subjects
              if item.get("kind") == "windows"
          }
          if windows_subjects != expected_windows:
              raise SystemExit("WINDOWS_ATTESTATION_SUBJECTS_MISMATCH")
          expected_oci = {
              (manifest["images"][service]["reference"], manifest["images"][service]["digest"])
              for service in ("backend", "frontend")
          }
          oci_subjects = {
              (item.get("name"), item.get("digest"))
              for item in subjects
              if item.get("kind") == "oci"
          }
          if oci_subjects != expected_oci:
              raise SystemExit("OCI_ATTESTATION_SUBJECTS_MISMATCH")
          PY

          ci_run_id="$(python3 - "$manifest_path" <<'PY'
          import json
          import sys
          from pathlib import Path

          print(json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))["ci"]["run_id"])
          PY
          )"
          ci_metadata="$RUNNER_TEMP/ci-run.json"
          gh run view "$ci_run_id" \
            --repo "$GITHUB_REPOSITORY" \
            --json conclusion,event,headBranch,headSha,jobs,workflowName > "$ci_metadata"
          python3 - "$ci_metadata" "$EXPECTED_SOURCE_SHA" <<'PY'
          import json
          import sys
          from pathlib import Path

          metadata = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          if metadata.get("workflowName") != "CI" or metadata.get("conclusion") != "success":
              raise SystemExit("UNVERIFIED_CI_WORKFLOW")
          if metadata.get("event") != "push" or metadata.get("headBranch") != "main":
              raise SystemExit("CI_MAIN_PUSH_REQUIRED")
          if metadata.get("headSha") != sys.argv[2]:
              raise SystemExit("CI_SOURCE_SHA_MISMATCH")
          gates = [job for job in metadata.get("jobs", []) if job.get("name") == "Release gate"]
          if len(gates) != 1 or gates[0].get("conclusion") != "success":
              raise SystemExit("CI_RELEASE_GATE_NOT_SUCCESSFUL")
          PY

          windows_dir="$RUNNER_TEMP/windows-release"
          mkdir -p "$windows_dir"
          gh run download "$ARTIFACT_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name taksklad-windows-release \
            --dir "$windows_dir"
          python3 - "$manifest_path" "$windows_dir" <<'PY'
          import hashlib
          import json
          import sys
          from pathlib import Path

          manifest = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          root = Path(sys.argv[2])
          windows = manifest["windows"]
          expected = {
              windows["artifact"]: windows["artifact_sha256"],
              windows["artifact_onedir"]: windows["artifact_sha256_onedir"],
              windows["manifest"]: windows["manifest_sha256"],
          }
          for name, digest in expected.items():
              path = root / name
              if not path.is_file() or hashlib.sha256(path.read_bytes()).hexdigest() != digest:
                  raise SystemExit(f"WINDOWS_SUBJECT_SHA256_MISMATCH:{name}")
          PY
          for subject in TakSklad.exe TakSklad-windows-x64.zip version.json; do
            gh attestation verify "$windows_dir/$subject" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$signer_workflow" \
              --source-digest "$EXPECTED_SOURCE_SHA"
          done

          printf '%s' "$GH_TOKEN" | docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin
          mapfile -t image_references < <(python3 - "$manifest_path" <<'PY'
          import json
          import sys
          from pathlib import Path

          manifest = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          for role in ("backend", "frontend"):
              print(manifest["images"][role]["reference"])
          PY
          )
          test "${#image_references[@]}" -eq 2
          for reference in "${image_references[@]}"; do
            gh attestation verify "oci://$reference" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$signer_workflow" \
              --source-digest "$EXPECTED_SOURCE_SHA"
          done
          printf 'RELEASE_MANIFEST_PATH=%s\n' "$manifest_path" >> "$GITHUB_ENV"

      - name: Checkout exact verified release SHA
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Verify release tag resolves to exact source SHA
        env:
          EXPECTED_SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          release_tag="$(python3 - "$RELEASE_MANIFEST_PATH" <<'PY'
          import json
          import sys
          from pathlib import Path

          print(json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))["release_tag"])
          PY
          )"
          git show-ref --verify --quiet "refs/tags/$release_tag" || {
            echo "IMMUTABLE_RELEASE_TAG_REQUIRED" >&2
            exit 1
          }
          test "$(git rev-parse "refs/tags/$release_tag^{commit}")" = "$EXPECTED_SOURCE_SHA" || {
            echo "RELEASE_TAG_SOURCE_SHA_MISMATCH" >&2
            exit 1
          }

      - name: Validate deploy script syntax
        run: bash -n deploy/vds/deploy_from_git.sh

      - name: Package exact-SHA deployment control plane
        run: |
          set -euo pipefail
          tar -czf "$RUNNER_TEMP/taksklad-deploy-control.tar.gz" \
            deploy/vds/deploy_from_git.sh \
            deploy/vds/docker-compose.yml \
            deploy/vds/acceptance_status.sh \
            deploy/vds/backup_postgres.sh \
            test-artifacts/disaster-recovery/restore-drill.json \
            tools/check_data_invariants.py \
            tools/collect_phase27_evidence.py \
            tools/live_release_verifier.sh \
            tools/production_preflight.sh \
            tools/production_release_checks.py \
            tools/release_artifacts.py \
            tools/validate_deploy_probe.py \
            tools/write_maintenance_marker.py

      - name: Validate required secrets
        env:
          VDS_HOST: ${{ secrets.VDS_HOST }}
          VDS_USER: ${{ secrets.VDS_USER }}
          VDS_SSH_KEY: ${{ secrets.VDS_SSH_KEY }}
          VDS_SSH_KNOWN_HOSTS: ${{ secrets.VDS_SSH_KNOWN_HOSTS }}
        run: |
          test -n "$VDS_HOST"
          test -n "$VDS_USER"
          test -n "$VDS_SSH_KEY"
          test -n "$VDS_SSH_KNOWN_HOSTS"

      - name: Install SSH key
        env:
          VDS_SSH_KEY: ${{ secrets.VDS_SSH_KEY }}
          VDS_SSH_KNOWN_HOSTS: ${{ secrets.VDS_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VDS_SSH_KEY" > ~/.ssh/taksklad_deploy_key
          chmod 600 ~/.ssh/taksklad_deploy_key
          printf '%s\n' "$VDS_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Copy exact-SHA control bundle and verified manifest to VDS
        env:
          VDS_HOST: ${{ secrets.VDS_HOST }}
          VDS_USER: ${{ secrets.VDS_USER }}
        run: |
          scp -i ~/.ssh/taksklad_deploy_key \
            "$RUNNER_TEMP/taksklad-deploy-control.tar.gz" \
            "$RELEASE_MANIFEST_PATH" \
            "$VDS_USER@$VDS_HOST:/tmp/"

      - name: Deploy on VDS
        env:
          VDS_HOST: ${{ secrets.VDS_HOST }}
          VDS_USER: ${{ secrets.VDS_USER }}
          VDS_APP_DIR: ${{ secrets.VDS_APP_DIR }}
          DEPLOY_ACCEPTANCE: required
          GH_TOKEN: ${{ github.token }}
          GHCR_USER: ${{ github.actor }}
          PRODUCTION_APPROVAL: READY_FOR_PRODUCTION_DEPLOY
        run: |
          set -euo pipefail
          app_dir="${VDS_APP_DIR:-/opt/stacks/taksklad/app}"
          remote="$VDS_USER@$VDS_HOST"
          remote_docker_config="/tmp/taksklad-ghcr-auth-${GITHUB_RUN_ID}"
          ssh -i ~/.ssh/taksklad_deploy_key "$remote" \
            "install -d -m 700 $(printf '%q' "$remote_docker_config")"
          printf '%s' "$GH_TOKEN" | ssh -i ~/.ssh/taksklad_deploy_key "$remote" \
            "DOCKER_CONFIG=$(printf '%q' "$remote_docker_config") docker login ghcr.io --username $(printf '%q' "$GHCR_USER") --password-stdin" >/dev/null
          cleanup_registry_auth() {
            ssh -i ~/.ssh/taksklad_deploy_key "$remote" \
              "DOCKER_CONFIG=$(printf '%q' "$remote_docker_config") docker logout ghcr.io >/dev/null 2>&1 || true; rm -rf $(printf '%q' "$remote_docker_config")" || true
          }
          trap cleanup_registry_auth EXIT
          ssh -i ~/.ssh/taksklad_deploy_key "$remote" 'bash -s' <<EOF
          set -euo pipefail
          app_dir=$(printf '%q' "$app_dir")
          install -d -m 755 "$app_dir"
          tar -xzf /tmp/taksklad-deploy-control.tar.gz -C "$app_dir" --no-same-owner
          install -m 600 /tmp/release.json "$app_dir/release.json"
          export TAKSKLAD_DEPLOY_APP_DIR=$(printf '%q' "$app_dir")
          export TAKSKLAD_DEPLOY_ACCEPTANCE=$(printf '%q' "$DEPLOY_ACCEPTANCE")
          export TAKSKLAD_PRODUCTION_APPROVAL=$(printf '%q' "$PRODUCTION_APPROVAL")
          export DOCKER_CONFIG=$(printf '%q' "$remote_docker_config")
          cd "$app_dir"
          export PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=.
          install -d -m 700 .release-state
          env_backup=".release-state/phase27-env-pre-recovery-\$(date -u +%Y%m%dT%H%M%SZ)"
          install -m 600 deploy/vds/.env "\$env_backup"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          import subprocess

          env_path = Path("deploy/vds/.env")
          container_env = json.loads(subprocess.check_output(
              ["docker", "inspect", "--format", "{{json .Config.Env}}", "vds-telegram-worker-1"],
              text=True,
          ))
          resolved = dict(item.split("=", 1) for item in container_env if "=" in item)

          def csv_items(value):
              return [part.strip() for part in str(value or "").split(",") if part.strip()]

          allowed = csv_items(resolved.get("TELEGRAM_ALLOWED_CHAT_IDS"))
          scheduled = csv_items(resolved.get("SKLADBOT_DAILY_REPORT_CHAT_IDS"))
          merged = list(dict.fromkeys([*allowed, *scheduled]))
          if not merged:
              raise SystemExit("PRODUCTION_CONFIG_RECOVERY_MISSING_TELEGRAM_ALLOWLIST")

          updates = {
              "TAKSKLAD_LEGACY_AUTH_EXPIRES_AT": "2026-07-17T00:00:00+00:00",
              "TELEGRAM_ALLOWED_CHAT_IDS": ",".join(merged),
          }
          lines = env_path.read_text(encoding="utf-8").splitlines()
          found = set()
          output = []
          for line in lines:
              key = line.split("=", 1)[0].strip() if "=" in line and not line.lstrip().startswith("#") else ""
              if key in updates:
                  output.append(f"{key}={updates[key]}")
                  found.add(key)
              else:
                  output.append(line)
          for key, value in updates.items():
              if key not in found:
                  output.append(f"{key}={value}")
          temporary = env_path.with_suffix(".env.phase27.tmp")
          temporary.write_text("\n".join(output) + "\n", encoding="utf-8")
          os.chmod(temporary, 0o600)
          os.replace(temporary, env_path)
          print("PRODUCTION_CONFIG_RECOVERY_OK fields=TAKSKLAD_LEGACY_AUTH_EXPIRES_AT,TELEGRAM_ALLOWED_CHAT_IDS values_redacted=1")
          PY
          chmod +x deploy/vds/deploy_from_git.sh tools/production_preflight.sh tools/live_release_verifier.sh
          PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=. python3 tools/release_artifacts.py verify --manifest release.json
          eval "\$(PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=. python3 tools/release_artifacts.py emit-shell --manifest release.json)"
          docker pull "\$RELEASE_BACKEND_IMAGE"
          docker pull "\$RELEASE_FRONTEND_IMAGE"
          export TAKSKLAD_BACKEND_IMAGE="\$RELEASE_BACKEND_IMAGE"
          export TAKSKLAD_FRONTEND_IMAGE="\$RELEASE_FRONTEND_IMAGE"
          docker compose --env-file deploy/vds/.env -f deploy/vds/docker-compose.yml \
            pull postgres-wal-init postgres
          wal_volume="\$(docker volume ls \
            --filter label=com.docker.compose.project=vds \
            --filter label=com.docker.compose.volume=postgres_wal_archive \
            --format '{{.Name}}' | head -n 1)"
          test -n "\$wal_volume"
          postgres_image="\$(docker compose --env-file deploy/vds/.env \
            -f deploy/vds/docker-compose.yml config --images | grep '^postgres:' | head -n 1)"
          test -n "\$postgres_image"
          docker run --rm --user 0:0 \
            --mount "type=volume,src=\$wal_volume,dst=/wal-archive" \
            "\$postgres_image" sh -ec 'chown -R 70:70 /wal-archive; chmod 700 /wal-archive'
          docker compose --env-file deploy/vds/.env -f deploy/vds/docker-compose.yml \
            up -d --no-deps --no-build --pull never --wait --wait-timeout 180 postgres
          current_revision="\$(docker compose --env-file deploy/vds/.env \
            -f deploy/vds/docker-compose.yml exec -T postgres sh -ec \
            'psql -At -U "\$POSTGRES_USER" -d "\$POSTGRES_DB" -c "select version_num from alembic_version"' </dev/null)"
          target_revision="\$(docker compose --env-file deploy/vds/.env \
            -f deploy/vds/docker-compose.yml run --rm --no-deps --pull never \
            backend-api alembic -c alembic.ini heads </dev/null | tail -n 1 | awk '{print \$1}')"
          test -n "\$current_revision"
          test -n "\$target_revision"
          if test "\$current_revision" = "\$target_revision"; then
            ./deploy/vds/backup_postgres.sh --no-prune </dev/null
            export TAKSKLAD_COMMIT_SHA="\$RELEASE_SOURCE_SHA"
            export TAKSKLAD_IMAGE_DIGEST="\$RELEASE_BACKEND_DIGEST"
            docker compose --env-file deploy/vds/.env -f deploy/vds/docker-compose.yml \
              up -d --no-deps --no-build --pull never \
              backend-api frontend telegram-worker google-sheets-sync-worker \
              skladbot-worker smartup-auto-import-worker
            backend_id="\$(docker compose --env-file deploy/vds/.env \
              -f deploy/vds/docker-compose.yml ps -q backend-api </dev/null)"
            cat > /tmp/taksklad-phase27-recover.py <<'PY'
          from datetime import datetime, timezone

          from sqlalchemy import select

          from app import skladbot_daily_report
          from app.db import SessionLocal
          from app.health_service import (
              count_unresolved_hot_path_failures,
              daily_report_event_report_date,
              daily_report_failure_resolved_by_later_success,
          )
          from app.models import AuditLog, Incident, PendingEvent

          terminal = ("resolved", "ignored", "cancelled")
          with SessionLocal() as db:
              failures = db.execute(
                  select(PendingEvent)
                  .where(PendingEvent.event_type == "skladbot_daily_report_send")
                  .where(PendingEvent.status == "failed")
              ).scalars().all()
              today = skladbot_daily_report.business_today().isoformat()
              historical = []
              current = 0
              for event in failures:
                  if daily_report_failure_resolved_by_later_success(db, event):
                      continue
                  already_terminal = db.execute(
                      select(Incident.id)
                      .where(Incident.pending_event_id == event.id)
                      .where(Incident.status.in_(terminal))
                  ).first()
                  if already_terminal:
                      continue
                  if daily_report_event_report_date(event) == today:
                      current += 1
                  else:
                      historical.append(event)
              if current:
                  raise SystemExit("current daily report failures require delivery recovery")
              now = datetime.now(timezone.utc)
              for event in historical:
                  db.add(Incident(
                      source="phase27_historical_daily_report_recovery",
                      severity="warning",
                      status="resolved",
                      title="Historical daily report failure acknowledged after configuration recovery",
                      message="Not resent to prevent stale or duplicate external delivery.",
                      entity_type="pending_event",
                      entity_id=str(event.id),
                      pending_event_id=event.id,
                      raw_payload={"event_type": event.event_type, "resolution": "not_resent_historical"},
                      resolved_at=now,
                  ))
                  db.add(AuditLog(
                      action="historical_daily_report_failure_resolved",
                      entity_type="pending_event",
                      entity_id=str(event.id),
                      payload={
                          "event_type": event.event_type,
                          "actor": "phase27_deploy",
                          "reason": "telegram_configuration_recovered_historical_report_not_resent",
                      },
                  ))
              db.commit()
              blockers = count_unresolved_hot_path_failures(db)
              if blockers:
                  raise SystemExit("unresolved hot path blockers remain")
              print(f"PHASE27_HISTORICAL_REPORT_RECOVERY_OK resolved={len(historical)} blockers=0 external_sends=0")
          PY
            chmod 600 /tmp/taksklad-phase27-recover.py
            docker cp /tmp/taksklad-phase27-recover.py "\$backend_id:/tmp/taksklad-phase27-recover.py"
            docker exec "\$backend_id" python /tmp/taksklad-phase27-recover.py </dev/null
            docker exec "\$backend_id" rm -f /tmp/taksklad-phase27-recover.py </dev/null
            rm -f /tmp/taksklad-phase27-recover.py
            runtime_ready=0
            for attempt in \$(seq 1 36); do
              frontend_id="\$(docker compose --env-file deploy/vds/.env \
                -f deploy/vds/docker-compose.yml ps -q frontend </dev/null)"
              backend_health="\$(docker inspect --format '{{.State.Health.Status}}' "\$backend_id" 2>/dev/null || true)"
              frontend_health="\$(docker inspect --format '{{.State.Health.Status}}' "\$frontend_id" 2>/dev/null || true)"
              if test "\$backend_health" = healthy && test "\$frontend_health" = healthy; then
                runtime_ready=1
                break
              fi
              sleep 5
            done
            if test "\$runtime_ready" != 1; then
              for service in backend-api frontend telegram-worker google-sheets-sync-worker skladbot-worker smartup-auto-import-worker; do
                service_id="\$(docker compose --env-file deploy/vds/.env \
                  -f deploy/vds/docker-compose.yml ps -q "\$service" </dev/null)"
                docker inspect --format "RUNTIME_STATE service=\$service status={{.State.Status}} health={{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}} restart_count={{.RestartCount}} exit_code={{.State.ExitCode}}" \
                  "\$service_id" || true
                docker logs --tail 200 "\$service_id" 2>&1 | \
                  grep -E 'Invalid configuration:|configuration invalid:' | tail -n 5 || true
              done
              docker exec "\$backend_id" python -c "import json; from urllib.error import HTTPError; from urllib.request import urlopen; u='http://127.0.0.1:8000/ready';
          try: r=urlopen(u, timeout=5)
          except HTTPError as e: r=e
          p=json.load(r); print(json.dumps({'ready':p.get('ready'),'status':p.get('status'),'database':p.get('database'),'migrations':p.get('migrations'),'workers':p.get('workers'),'policy':p.get('policy'),'queue':p.get('queue')}, sort_keys=True))" </dev/null || true
              docker exec "\$backend_id" python -c "import json; from sqlalchemy import func, select; from app import skladbot_daily_report; from app.db import SessionLocal; from app.health_service import daily_report_event_report_date, daily_report_failure_resolved_by_later_success; from app.models import PendingEvent; db=SessionLocal(); rows=db.execute(select(PendingEvent.event_type, PendingEvent.status, func.count(PendingEvent.id)).where(PendingEvent.status.in_(('failed','error','blocked'))).where(PendingEvent.event_type != 'google_sheets_export').group_by(PendingEvent.event_type, PendingEvent.status).order_by(PendingEvent.event_type, PendingEvent.status)).all(); events=db.execute(select(PendingEvent).where(PendingEvent.event_type == 'skladbot_daily_report_send').where(PendingEvent.status == 'failed')).scalars().all(); unresolved=[e for e in events if not daily_report_failure_resolved_by_later_success(db,e)]; today=skladbot_daily_report.business_today().isoformat(); summary={'groups':[{'event_type':a,'status':b,'count':int(c)} for a,b,c in rows], 'unresolved_daily_report_current':sum(daily_report_event_report_date(e) == today for e in unresolved), 'unresolved_daily_report_historical':sum(daily_report_event_report_date(e) != today for e in unresolved)}; db.close(); print('HOT_PATH_FAILURE_GROUPS ' + json.dumps(summary, sort_keys=True))" </dev/null || true
              exit 1
            fi
            echo "PHASE27_RETRY_RUNTIME_OK revision=\$current_revision"
          fi
          install -d -m 700 .release-state
          PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=. python3 tools/collect_phase27_evidence.py \
            preflight --manifest release.json --output .release-state/production-preflight.json </dev/null
          ./tools/production_preflight.sh --read-only --require-current-backup --require-zero-blockers </dev/null
          sed -i 's/compose up -d --no-build/compose up -d --no-deps --no-build/g' \
            deploy/vds/deploy_from_git.sh
          grep -q 'compose up -d --no-deps --no-build' deploy/vds/deploy_from_git.sh
          ./deploy/vds/deploy_from_git.sh --artifact-manifest release.json --acceptance required --wait </dev/null
          PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=. python3 tools/collect_phase27_evidence.py \
            live --manifest release.json --output .release-state/live-release-verification.json </dev/null
          ./tools/live_release_verifier.sh --read-only --same-sha --slo-window </dev/null
          install -m 600 .release-state/production-preflight.json /tmp/taksklad-production-preflight.json
          install -m 600 .release-state/live-release-verification.json /tmp/taksklad-live-release-verification.json
          EOF
          cleanup_registry_auth
          trap - EXIT

      - name: Collect sanitized Phase 27 evidence
        if: always()
        env:
          VDS_HOST: ${{ secrets.VDS_HOST }}
          VDS_USER: ${{ secrets.VDS_USER }}
        run: |
          set -euo pipefail
          evidence_dir="$RUNNER_TEMP/phase27-evidence"
          mkdir -p "$evidence_dir"
          for name in production-preflight live-release-verification; do
            scp -i ~/.ssh/taksklad_deploy_key \
              "$VDS_USER@$VDS_HOST:/tmp/taksklad-$name.json" "$evidence_dir/$name.json"
          done

      - name: Upload sanitized Phase 27 evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: taksklad-phase27-production-evidence
          if-no-files-found: error
          retention-days: 30
          path: ${{ runner.temp }}/phase27-evidence/

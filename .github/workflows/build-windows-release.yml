name: Build Immutable Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to
        required: true

permissions: {}

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      release_tag: ${{ steps.release.outputs.tag }}
      source_sha: ${{ steps.source.outputs.sha }}
    permissions:
      attestations: write
      contents: read
      id-token: write

    steps:
      - name: Resolve release tag
        id: release
        shell: pwsh
        env:
          RELEASE_EVENT_TAG: ${{ github.event.release.tag_name }}
          RELEASE_INPUT_TAG: ${{ inputs.tag }}
        run: |
          $tag = $env:RELEASE_EVENT_TAG
          if (-not $tag) {
            $tag = $env:RELEASE_INPUT_TAG
          }
          if (-not $tag -or $tag -notmatch '^(?:v)?[0-9]+\.[0-9]+\.[0-9]+(?:[-+][0-9A-Za-z.-]+)?$') {
            throw "IMMUTABLE_RELEASE_TAG_REQUIRED"
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-tags: true

      - name: Resolve immutable source commit
        id: source
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          $sha = (git rev-parse HEAD).Trim().ToLower()
          if ($sha -notmatch '^[0-9a-f]{40}$') {
            throw "Immutable source commit is required"
          }
          git show-ref --verify --quiet "refs/tags/$env:RELEASE_TAG"
          if ($LASTEXITCODE -ne 0) {
            throw "IMMUTABLE_RELEASE_TAG_REQUIRED"
          }
          $tagSha = (git rev-parse "refs/tags/$env:RELEASE_TAG^{commit}").Trim().ToLower()
          if ($sha -ne $tagSha) {
            throw "IMMUTABLE_RELEASE_TAG_REQUIRED"
          }
          "sha=$sha" >> $env:GITHUB_OUTPUT

      - name: Validate release version contract
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          $configText = Get-Content src\taksklad\config.py -Raw
          if ($configText -notmatch 'APP_VERSION\s*=\s*"([^"]+)"') {
            throw "APP_VERSION not found in config.py"
          }
          $appVersion = $Matches[1]
          if ($env:RELEASE_TAG -ne "v$appVersion") {
            throw "IMMUTABLE_RELEASE_TAG_VERSION_MISMATCH"
          }
          $desktopLockSha256 = (Get-FileHash requirements\desktop.lock -Algorithm SHA256).Hash.ToLower()
          if ($desktopLockSha256 -notmatch '^[0-9a-f]{64}$') {
            throw "IMMUTABLE_DESKTOP_LOCK_SHA256_REQUIRED"
          }
          "TAKSKLAD_APP_VERSION=$appVersion" >> $env:GITHUB_ENV
          "TAKSKLAD_DESKTOP_LOCK_SHA256=$desktopLockSha256" >> $env:GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --require-hashes -r requirements/desktop.lock

      - name: Require Windows code-signing certificate
        shell: pwsh
        env:
          WINDOWS_CODESIGN_PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
          WINDOWS_CODESIGN_PFX_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CODESIGN_PFX_BASE64) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_CODESIGN_PFX_PASSWORD)) {
            throw "WINDOWS_CODESIGN_CERTIFICATE_NOT_AVAILABLE"
          }
          $certificatePath = Join-Path $env:RUNNER_TEMP "taksklad-codesign.pfx"
          try {
            $certificateBytes = [Convert]::FromBase64String($env:WINDOWS_CODESIGN_PFX_BASE64)
            [IO.File]::WriteAllBytes($certificatePath, $certificateBytes)
            $securePassword = ConvertTo-SecureString $env:WINDOWS_CODESIGN_PFX_PASSWORD -AsPlainText -Force
            $certificates = @(Import-PfxCertificate -FilePath $certificatePath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword)
          } catch {
            Remove-Item $certificatePath -Force -ErrorAction SilentlyContinue
            throw "WINDOWS_CODESIGN_CERTIFICATE_NOT_AVAILABLE"
          }
          $signingCertificates = @($certificates | Where-Object { $_.HasPrivateKey })
          if ($signingCertificates.Count -ne 1) {
            foreach ($importedCertificate in $certificates) {
              Remove-Item "Cert:\CurrentUser\My\$($importedCertificate.Thumbprint)" -Force -ErrorAction SilentlyContinue
            }
            Remove-Item $certificatePath -Force -ErrorAction SilentlyContinue
            throw "WINDOWS_CODESIGN_CERTIFICATE_NOT_AVAILABLE"
          }
          $certificate = $signingCertificates[0]
          $hasher = [System.Security.Cryptography.SHA256]::Create()
          try {
            $certificateSha256 = -join ($hasher.ComputeHash($certificate.RawData) | ForEach-Object { $_.ToString('x2') })
          } finally {
            $hasher.Dispose()
          }
          python tools\verify_windows_signer_allowlist.py --require $certificateSha256
          if ($LASTEXITCODE -ne 0) {
            foreach ($importedCertificate in $certificates) {
              Remove-Item "Cert:\CurrentUser\My\$($importedCertificate.Thumbprint)" -Force -ErrorAction SilentlyContinue
            }
            Remove-Item $certificatePath -Force -ErrorAction SilentlyContinue
            throw "WINDOWS_CODESIGN_IDENTITY_NOT_PINNED"
          }
          "WINDOWS_CODESIGN_CERTIFICATE_PATH=$certificatePath" >> $env:GITHUB_ENV
          "WINDOWS_CODESIGN_CERTIFICATE_THUMBPRINT=$($certificate.Thumbprint)" >> $env:GITHUB_ENV
          "WINDOWS_CODESIGN_CERTIFICATE_SHA256=$certificateSha256" >> $env:GITHUB_ENV
          "WINDOWS_CODESIGN_IMPORTED_THUMBPRINTS=$(@($certificates.Thumbprint) -join ',')" >> $env:GITHUB_ENV

      - name: Prepare PyInstaller import path
        shell: pwsh
        run: |
          $srcPath = (Resolve-Path src).Path
          $env:PYTHONPATH = $srcPath
          "PYTHONPATH=$srcPath" >> $env:GITHUB_ENV
          if (Test-Path taksklad) {
            Rename-Item taksklad taksklad_bridge_disabled
          }
          python -c "import taksklad, taksklad.main; print(taksklad.__file__)"

      - name: Build legacy onefile transition app
        shell: pwsh
        run: |
          pyinstaller --clean --onefile --windowed --paths src --collect-submodules=taksklad --add-data "assets\product_images;assets\product_images" --name TakSklad --icon assets\TakSklad.ico --distpath dist\transition pyinstaller_entry.py

      - name: Smoke test transition exe imports from clean directory
        shell: pwsh
        run: |
          $smokeDir = Join-Path $env:RUNNER_TEMP "taksklad-smoke-transition"
          if (Test-Path $smokeDir) {
            Remove-Item $smokeDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $smokeDir | Out-Null
          Copy-Item dist\transition\TakSklad.exe $smokeDir\TakSklad.exe -Force
          Push-Location $smokeDir
          try {
            & .\TakSklad.exe --smoke-import
            & .\TakSklad.exe --smoke-gui
          } finally {
            Pop-Location
          }

      - name: Sign and verify transition executable
        shell: pwsh
        run: |
          & signtool.exe sign /sha1 "$env:WINDOWS_CODESIGN_CERTIFICATE_THUMBPRINT" /s My /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com dist\transition\TakSklad.exe
          if ($LASTEXITCODE -ne 0) {
            throw "WINDOWS_CODESIGN_FAILED"
          }
          $signature = Get-AuthenticodeSignature dist\transition\TakSklad.exe
          if ($signature.Status -ne [System.Management.Automation.SignatureStatus]::Valid) {
            throw "WINDOWS_CODESIGN_INVALID: transition executable"
          }
          $hasher = [System.Security.Cryptography.SHA256]::Create()
          try {
            $signerSha256 = -join ($hasher.ComputeHash($signature.SignerCertificate.RawData) | ForEach-Object { $_.ToString('x2') })
          } finally {
            $hasher.Dispose()
          }
          if ($signerSha256 -ne $env:WINDOWS_CODESIGN_CERTIFICATE_SHA256) {
            throw "WINDOWS_CODESIGN_IDENTITY_MISMATCH"
          }

      - name: Compute transition exe SHA256
        shell: pwsh
        run: |
          $hash = (Get-FileHash dist\transition\TakSklad.exe -Algorithm SHA256).Hash.ToLower()
          $hash | Out-File -FilePath dist\TakSklad.exe.sha256.txt -Encoding ascii -NoNewline
          "TAKSKLAD_EXE_SHA256=$hash" >> $env:GITHUB_ENV

      - name: Build onedir app
        shell: pwsh
        run: |
          pyinstaller --clean --onedir --windowed --paths src --collect-submodules=taksklad --add-data "assets\product_images;assets\product_images" --name TakSklad --icon assets\TakSklad.ico --distpath dist\onedir pyinstaller_entry.py
          $smokeDir = Join-Path $env:RUNNER_TEMP "taksklad-smoke-onedir"
          if (Test-Path $smokeDir) {
            Remove-Item $smokeDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $smokeDir | Out-Null
          Copy-Item dist\onedir\TakSklad $smokeDir\TakSklad -Recurse -Force
          Push-Location $smokeDir
          try {
            & .\TakSklad\TakSklad.exe --smoke-import
            & .\TakSklad\TakSklad.exe --smoke-gui
          } finally {
            Pop-Location
          }
          Copy-Item README.txt dist\onedir\TakSklad\README.txt -Force
          $manifest = [ordered]@{
            app_version = $env:TAKSKLAD_APP_VERSION
            release_tag = "${{ steps.release.outputs.tag }}"
            update_info_url = "https://raw.githubusercontent.com/1fear/TakSklad/${{ steps.source.outputs.sha }}/version.json"
            release_url = "https://github.com/1fear/TakSklad/releases/tag/${{ steps.release.outputs.tag }}"
            package_type = "onedir_zip"
            source_sha = "${{ steps.source.outputs.sha }}"
            dependency_lock_sha256 = $env:TAKSKLAD_DESKTOP_LOCK_SHA256
            signature_type = "authenticode"
            signature_required = $true
            signer_certificate_sha256 = $env:WINDOWS_CODESIGN_CERTIFICATE_SHA256
          }
          $manifest | ConvertTo-Json | Out-File dist\onedir\TakSklad\version.json -Encoding utf8

      - name: Sign and verify onedir executable
        shell: pwsh
        run: |
          & signtool.exe sign /sha1 "$env:WINDOWS_CODESIGN_CERTIFICATE_THUMBPRINT" /s My /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com dist\onedir\TakSklad\TakSklad.exe
          if ($LASTEXITCODE -ne 0) {
            throw "WINDOWS_CODESIGN_FAILED"
          }
          $signature = Get-AuthenticodeSignature dist\onedir\TakSklad\TakSklad.exe
          if ($signature.Status -ne [System.Management.Automation.SignatureStatus]::Valid) {
            throw "WINDOWS_CODESIGN_INVALID: onedir executable"
          }
          $hasher = [System.Security.Cryptography.SHA256]::Create()
          try {
            $signerSha256 = -join ($hasher.ComputeHash($signature.SignerCertificate.RawData) | ForEach-Object { $_.ToString('x2') })
          } finally {
            $hasher.Dispose()
          }
          if ($signerSha256 -ne $env:WINDOWS_CODESIGN_CERTIFICATE_SHA256) {
            throw "WINDOWS_CODESIGN_IDENTITY_MISMATCH"
          }

      - name: Remove code-signing material
        if: always()
        shell: pwsh
        run: |
          if ($env:WINDOWS_CODESIGN_IMPORTED_THUMBPRINTS) {
            foreach ($thumbprint in $env:WINDOWS_CODESIGN_IMPORTED_THUMBPRINTS.Split(',')) {
              if ($thumbprint) {
                Remove-Item "Cert:\CurrentUser\My\$thumbprint" -Force -ErrorAction SilentlyContinue
              }
            }
          }
          if ($env:WINDOWS_CODESIGN_CERTIFICATE_PATH) {
            Remove-Item $env:WINDOWS_CODESIGN_CERTIFICATE_PATH -Force -ErrorAction SilentlyContinue
          }

      - name: Package onedir app
        shell: pwsh
        run: |
          $zipPath = "dist\TakSklad-windows-x64.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path dist\onedir\TakSklad -DestinationPath $zipPath -CompressionLevel Optimal
          $hash = (Get-FileHash $zipPath -Algorithm SHA256).Hash.ToLower()
          $hash | Out-File -FilePath "$zipPath.sha256.txt" -Encoding ascii -NoNewline
          "TAKSKLAD_ZIP_SHA256=$hash" >> $env:GITHUB_ENV

      - name: Generate immutable release manifest
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          $releaseBaseUrl = "https://github.com/1fear/TakSklad/releases/download/$env:RELEASE_TAG"
          $manifest = [ordered]@{
            latest_version = $env:TAKSKLAD_APP_VERSION
            release_tag = $env:RELEASE_TAG
            package_type = "onefile_exe"
            entrypoint = "TakSklad.exe"
            download_url = "$releaseBaseUrl/TakSklad.exe"
            sha256 = $env:TAKSKLAD_EXE_SHA256
            artifact_sha256 = $env:TAKSKLAD_EXE_SHA256
            download_url_onedir = "$releaseBaseUrl/TakSklad-windows-x64.zip"
            sha256_onedir = $env:TAKSKLAD_ZIP_SHA256
            artifact_sha256_onedir = $env:TAKSKLAD_ZIP_SHA256
            dependency_lock_sha256 = $env:TAKSKLAD_DESKTOP_LOCK_SHA256
            signature_type = "authenticode"
            signature_required = $true
            signer_certificate_sha256 = $env:WINDOWS_CODESIGN_CERTIFICATE_SHA256
            source_sha = $env:SOURCE_SHA
          }
          if (
            $manifest.sha256 -notmatch '^[0-9a-f]{64}$' -or
            $manifest.sha256_onedir -notmatch '^[0-9a-f]{64}$' -or
            $manifest.dependency_lock_sha256 -notmatch '^[0-9a-f]{64}$'
          ) {
            throw "IMMUTABLE_RELEASE_SHA256_REQUIRED"
          }
          $manifest | ConvertTo-Json | Out-File dist\version.json -Encoding utf8
          Copy-Item dist\transition\TakSklad.exe dist\TakSklad.exe -Force

      - name: Attest Windows release subjects
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: |
            dist/TakSklad-windows-x64.zip
            dist/TakSklad.exe
            dist/version.json

      - name: Upload immutable Windows subjects and manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: taksklad-windows-release
          if-no-files-found: error
          retention-days: 30
          path: |
            dist/TakSklad-windows-x64.zip
            dist/TakSklad-windows-x64.zip.sha256.txt
            dist/TakSklad.exe
            dist/TakSklad.exe.sha256.txt
            dist/version.json

  build-container-subjects:
    needs: build-windows
    runs-on: ubuntu-latest
    outputs:
      backend_digest: ${{ steps.backend.outputs.digest }}
      frontend_digest: ${{ steps.frontend.outputs.digest }}
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Checkout exact release SHA
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.build-windows.outputs.source_sha }}
          fetch-tags: true

      - name: Verify exact release SHA checkout
        env:
          RELEASE_TAG: ${{ needs.build-windows.outputs.release_tag }}
          SOURCE_SHA: ${{ needs.build-windows.outputs.source_sha }}
        run: |
          set -euo pipefail
          [[ "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo "IMMUTABLE_SOURCE_SHA_REQUIRED" >&2
            exit 1
          }
          git show-ref --verify --quiet "refs/tags/$RELEASE_TAG" || {
            echo "IMMUTABLE_RELEASE_TAG_REQUIRED" >&2
            exit 1
          }
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA" || {
            echo "IMMUTABLE_SOURCE_SHA_REQUIRED" >&2
            exit 1
          }
          test "$SOURCE_SHA" = "$(git rev-parse "refs/tags/$RELEASE_TAG^{commit}")" || {
            echo "IMMUTABLE_RELEASE_TAG_REQUIRED" >&2
            exit 1
          }

      - name: Verify release supply-chain inputs
        run: |
          ./tools/verify_locked_installs.sh --cold --require-hashes
          ./tools/security_gate.sh --fail-on high
          ./tools/generate_sbom.sh --verify
          PYTHONDONTWRITEBYTECODE=1 python3 tools/verify_immutable_refs.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Authenticate to GitHub Container Registry
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          printf '%s' "$GH_TOKEN" | docker login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Build and publish backend image once
        id: backend
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: backend
          file: backend/Dockerfile
          platforms: linux/amd64
          provenance: false
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/taksklad-backend:sha-${{ needs.build-windows.outputs.source_sha }}

      - name: Build and publish frontend image once
        id: frontend
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: frontend
          file: frontend/Dockerfile
          platforms: linux/amd64
          provenance: false
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/taksklad-frontend:sha-${{ needs.build-windows.outputs.source_sha }}

      - name: Validate published image digests
        env:
          BACKEND_DIGEST: ${{ steps.backend.outputs.digest }}
          FRONTEND_DIGEST: ${{ steps.frontend.outputs.digest }}
        run: |
          set -euo pipefail
          [[ "$BACKEND_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]] || {
            echo "IMMUTABLE_BACKEND_DIGEST_REQUIRED" >&2
            exit 1
          }
          [[ "$FRONTEND_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]] || {
            echo "IMMUTABLE_FRONTEND_DIGEST_REQUIRED" >&2
            exit 1
          }

      - name: Attest backend registry digest
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/taksklad-backend
          subject-digest: ${{ steps.backend.outputs.digest }}
          push-to-registry: true

      - name: Attest frontend registry digest
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/taksklad-frontend
          subject-digest: ${{ steps.frontend.outputs.digest }}
          push-to-registry: true

      - name: Upload release SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: taksklad-release-sbom
          if-no-files-found: error
          retention-days: 30
          path: test-artifacts/sbom/

  release-manifest:
    needs:
      - build-windows
      - build-container-subjects
    runs-on: ubuntu-latest
    permissions:
      actions: read
      attestations: write
      contents: write
      id-token: write

    steps:
      - name: Download immutable Windows manifest and subjects
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist/windows
          gh run download "$GITHUB_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name taksklad-windows-release \
            --dir dist/windows

      - name: Generate unified release manifest
        env:
          ARTIFACT_RUN_ID: ${{ github.run_id }}
          BACKEND_DIGEST: ${{ needs.build-container-subjects.outputs.backend_digest }}
          BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/taksklad-backend
          FRONTEND_DIGEST: ${{ needs.build-container-subjects.outputs.frontend_digest }}
          FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/taksklad-frontend
          RELEASE_TAG: ${{ needs.build-windows.outputs.release_tag }}
          SOURCE_SHA: ${{ needs.build-windows.outputs.source_sha }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import re
          from pathlib import Path

          sha_re = re.compile(r"^[0-9a-f]{40}$")
          digest_re = re.compile(r"^sha256:[0-9a-f]{64}$")
          source_sha = os.environ["SOURCE_SHA"]
          backend_digest = os.environ["BACKEND_DIGEST"]
          frontend_digest = os.environ["FRONTEND_DIGEST"]
          if not sha_re.fullmatch(source_sha):
              raise SystemExit("IMMUTABLE_SOURCE_SHA_REQUIRED")
          for name, value in (("backend", backend_digest), ("frontend", frontend_digest)):
              if not digest_re.fullmatch(value):
                  raise SystemExit(f"IMMUTABLE_{name.upper()}_DIGEST_REQUIRED")

          windows_path = Path("dist/windows/version.json")
          windows = json.loads(windows_path.read_text(encoding="utf-8-sig"))
          if windows.get("source_sha") != source_sha:
              raise SystemExit("WINDOWS_SOURCE_SHA_MISMATCH")
          for key in ("artifact_sha256", "artifact_sha256_onedir", "dependency_lock_sha256"):
              if not re.fullmatch(r"[0-9a-f]{64}", str(windows.get(key, ""))):
                  raise SystemExit(f"WINDOWS_{key.upper()}_REQUIRED")

          windows_manifest_sha256 = hashlib.sha256(windows_path.read_bytes()).hexdigest()
          backend_image = os.environ["BACKEND_IMAGE"]
          frontend_image = os.environ["FRONTEND_IMAGE"]
          manifest = {
              "schema_version": 1,
              "authority": "github-sigstore",
              "deployable": True,
              "artifact_run_id": int(os.environ["ARTIFACT_RUN_ID"]),
              "release_tag": os.environ["RELEASE_TAG"],
              "source_sha": source_sha,
              "release_id": f"github-{os.environ['ARTIFACT_RUN_ID']}",
              "acceptance_required": True,
              "images": {
                  "backend": {
                      "name": backend_image,
                      "tag": f"sha-{source_sha}",
                      "digest": backend_digest,
                      "reference": f"{backend_image}@{backend_digest}",
                  },
                  "frontend": {
                      "name": frontend_image,
                      "tag": f"sha-{source_sha}",
                      "digest": frontend_digest,
                      "reference": f"{frontend_image}@{frontend_digest}",
                  },
              },
              "windows": {
                  "manifest": "version.json",
                  "manifest_sha256": windows_manifest_sha256,
                  "artifact": "TakSklad.exe",
                  "version": windows["latest_version"],
                  "dependency_lock_sha256": windows["dependency_lock_sha256"],
                  "artifact_sha256": windows["artifact_sha256"],
                  "artifact_sha256_onedir": windows["artifact_sha256_onedir"],
                  "signature_type": windows["signature_type"],
                  "signature_required": windows["signature_required"],
                  "signer_certificate_sha256": windows["signer_certificate_sha256"],
              },
              "attestation_subjects": [
                  {"name": backend_image, "digest": backend_digest},
                  {"name": frontend_image, "digest": frontend_digest},
              ],
              "deployment_policy": {
                  "acceptance": "required",
                  "build_on_target": False,
                  "database_rollback": "retain-current-schema",
              },
              "database_rollback": {
                  "strategy": "retain-current-schema",
                  "alembic_downgrade_allowed": False,
              },
              "attestation": {
                  "type": "github-sigstore-slsa-v1",
                  "github_identity_verified": True,
                  "registry_attestation_verified": True,
              },
          }
          output = Path("dist/release.json")
          output.write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Attest unified release manifest
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: dist/release.json

      - name: Upload unified release manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: taksklad-release-manifest
          if-no-files-found: error
          retention-days: 30
          path: dist/release.json

      - name: Upload verified release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.build-windows.outputs.release_tag }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" \
            dist/windows/TakSklad-windows-x64.zip \
            dist/windows/TakSklad-windows-x64.zip.sha256.txt \
            dist/windows/TakSklad.exe \
            dist/windows/TakSklad.exe.sha256.txt \
            dist/windows/version.json \
            dist/release.json \
            --clobber

name: Immutable Reference Policy

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "**/Dockerfile*"
      - "**/*compose*.yml"
      - "**/*compose*.yaml"
      - "supply-chain/immutable-refs.json"
      - "tools/verify_immutable_refs.py"
      - "tests/test_immutable_refs.py"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "**/Dockerfile*"
      - "**/*compose*.yml"
      - "**/*compose*.yaml"
      - "supply-chain/immutable-refs.json"
      - "tools/verify_immutable_refs.py"
      - "tests/test_immutable_refs.py"

permissions:
  contents: read

jobs:
  immutable-references:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate full SHAs, image digests and update policy
        run: PYTHONDONTWRITEBYTECODE=1 python3 tools/verify_immutable_refs.py

      - name: Run immutable reference contract tests
        run: PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=. python3 -m unittest tests.test_immutable_refs

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: taksklad-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Reject forbidden release paths
        run: python tools/check_release_tree.py --strict --path-only

      - name: Install Linux GUI test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements/desktop.lock
            backend/requirements.lock

      - name: Verify locked dependency installs
        run: ./tools/verify_locked_installs.sh --cold --require-hashes

      - name: Run security policy gate
        run: ./tools/security_gate.sh --synthetic-fixtures --fail-on high

      - name: Generate and verify SBOM
        run: ./tools/generate_sbom.sh --verify

      - name: Verify immutable external references
        run: PYTHONDONTWRITEBYTECODE=1 python3 tools/verify_immutable_refs.py

      - name: Install Python dependencies
        run: |
          python -m pip install --require-hashes -r requirements/desktop.lock -r backend/requirements.lock

      - name: Compile Python sources
        run: |
          PYTHONPATH=. python -m compileall -q backend/app backend/migrations tools tests

      - name: Test PostgreSQL migration matrix
        run: ./tools/run_postgres_tests.sh migrations

      - name: Test PostgreSQL session barriers
        run: ./tools/run_postgres_tests.sh smoke

      - name: Test PostgreSQL readiness policy
        run: ./tools/run_postgres_tests.sh readiness

      - name: Run Python tests
        run: |
          PYTHONPATH=. python -m unittest discover -s tests

      - name: Check Alembic head
        run: |
          PYTHONPATH=. python -m alembic -c backend/alembic.ini heads

      - name: Check VDS shell scripts
        run: |
          for script in deploy/vds/*.sh; do
            bash -n "$script"
          done

      - name: Check VDS compose config
        run: |
          config_path="$RUNNER_TEMP/taksklad-compose-config"
          python tools/render_compose_test_config.py --output "$config_path"
          trap 'rm -f "$config_path"' EXIT
          COMPOSE_DISABLE_ENV_FILE=1 docker compose --env-file "$config_path" -f deploy/vds/docker-compose.yml config --quiet
          rm -f "$config_path"
          trap - EXIT

  container-isolation:
    name: Container isolation
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.lock

      - name: Install policy dependencies
        run: python -m pip install --require-hashes -r backend/requirements.lock

      - name: Render synthetic Compose inputs
        run: python tools/render_compose_test_config.py --output "$RUNNER_TEMP/taksklad-compose-config"

      - name: Build hardened images
        run: |
          COMPOSE_DISABLE_ENV_FILE=1 docker compose \
            --env-file "$RUNNER_TEMP/taksklad-compose-config" \
            -f deploy/vds/docker-compose.yml build --pull

      - name: Validate container policy
        run: |
          COMPOSE_DISABLE_ENV_FILE=1 docker compose \
            -f deploy/vds/docker-compose.yml config --no-interpolate --quiet
          PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=. python tools/check_container_policy.py --strict

      - name: Run disposable permission smoke
        run: ./tools/run_container_smoke.sh --dummy-config --permission-tests

      - name: Assert resource and log limits
        run: ./tools/run_container_load.sh --assert-resource-limits

  frontend:
    name: Frontend safety net
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Lint frontend
        run: npm --prefix frontend run lint

      - name: Type-check frontend
        run: npm --prefix frontend run typecheck

      - name: Test frontend
        run: npm --prefix frontend run test

      - name: Enforce frontend coverage
        run: npm --prefix frontend run test:coverage

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Install synthetic browser
        run: npx --prefix frontend playwright install --with-deps chromium

      - name: Run synthetic browser smoke
        run: npm --prefix frontend run e2e -- --grep @smoke

  release-gate:
    name: Release gate
    if: always()
    needs:
      - backend
      - container-isolation
      - frontend
    runs-on: ubuntu-latest
    steps:
      - name: Require every CI safety net
        env:
          BACKEND_RESULT: ${{ needs.backend.result }}
          CONTAINER_RESULT: ${{ needs.container-isolation.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
        run: |
          set -euo pipefail
          test "$BACKEND_RESULT" = success
          test "$CONTAINER_RESULT" = success
          test "$FRONTEND_RESULT" = success

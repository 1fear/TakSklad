name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: taksklad-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reject forbidden release paths
        run: python tools/check_release_tree.py --strict --path-only

      - name: Install Linux GUI test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            backend/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r backend/requirements.txt

      - name: Compile Python sources
        run: |
          PYTHONPATH=. python -m compileall -q backend/app backend/migrations tools tests

      - name: Test PostgreSQL migration matrix
        run: ./tools/run_postgres_tests.sh migrations

      - name: Test PostgreSQL session barriers
        run: ./tools/run_postgres_tests.sh smoke

      - name: Test PostgreSQL readiness policy
        run: ./tools/run_postgres_tests.sh readiness

      - name: Run Python tests
        run: |
          PYTHONPATH=. python -m unittest discover -s tests

      - name: Check Alembic head
        run: |
          PYTHONPATH=. python -m alembic -c backend/alembic.ini heads

      - name: Check VDS shell scripts
        run: |
          for script in deploy/vds/*.sh; do
            bash -n "$script"
          done

      - name: Check VDS compose config
        run: |
          config_path="$RUNNER_TEMP/taksklad-compose-config"
          python tools/render_compose_test_config.py --output "$config_path"
          trap 'rm -f "$config_path"' EXIT
          TAKSKLAD_ENV_FILE="$config_path" docker compose --env-file "$config_path" -f deploy/vds/docker-compose.yml config --quiet
          rm -f "$config_path"
          trap - EXIT

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm --prefix frontend run build

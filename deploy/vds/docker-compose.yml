x-app-hardening: &app-hardening
  init: true
  read_only: true
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  tmpfs:
    - /tmp:rw,noexec,nosuid,nodev,size=64m
  pids_limit: 256
  mem_limit: 768m
  cpus: 1.0
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "3"

services:
  postgres-wal-init:
    image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    restart: "no"
    user: "0:0"
    command: ["sh", "-c", "install -d -o 70 -g 70 -m 700 /wal-archive"]
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    pids_limit: 32
    mem_limit: 64m
    cpus: 0.1
    network_mode: none
    volumes:
      - type: volume
        source: postgres_wal_archive
        target: /wal-archive

  postgres:
    image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    restart: unless-stopped
    init: true
    user: "70:70"
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - archive_mode=on
      - -c
      - archive_timeout=900s
      - -c
      - archive_command=test ! -f /wal-archive/%f && cp %p /wal-archive/%f
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - type: volume
        source: postgres_data
        target: /var/lib/postgresql/data
        volume:
          nocopy: true
      - type: volume
        source: postgres_wal_archive
        target: /wal-archive
        volume:
          nocopy: true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
      - /var/run/postgresql:rw,nosuid,nodev,size=16m,uid=70,gid=70,mode=0770
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 1g
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taksklad-internal
    depends_on:
      postgres-wal-init:
        condition: service_completed_successfully

  principal-provisioner:
    <<: *app-hardening
    profiles: ["principal-admin"]
    image: ${TAKSKLAD_BACKEND_IMAGE}
    restart: "no"
    user: "${TAKSKLAD_PROVISIONER_UID:-10001}:${TAKSKLAD_PROVISIONER_GID:-10001}"
    entrypoint: ["python", "-m", "app.principal_handoff"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TAKSKLAD_PRINCIPAL_COMMAND_APPROVAL: ${TAKSKLAD_PRINCIPAL_COMMAND_APPROVAL:-}
      TAKSKLAD_PRINCIPAL_HANDOFF_ROOT: /run/taksklad-private
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - principal-admin
    volumes:
      - type: bind
        source: ${TAKSKLAD_PRINCIPAL_HANDOFF_HOST_PATH:-/opt/stacks/taksklad/private}
        target: /run/taksklad-private
    labels: []

  backend-api:
    <<: *app-hardening
    image: ${TAKSKLAD_BACKEND_IMAGE}
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TAKSKLAD_ENV: ${TAKSKLAD_ENV}
      TAKSKLAD_COMMIT_SHA: ${TAKSKLAD_COMMIT_SHA:-}
      TAKSKLAD_IMAGE_DIGEST: ${TAKSKLAD_IMAGE_DIGEST:-}
      TAKSKLAD_SERVER_RELEASE_ID: ${TAKSKLAD_SERVER_RELEASE_ID:-}
      TAKSKLAD_DESKTOP_API_CONTRACT: ${TAKSKLAD_DESKTOP_API_CONTRACT:-1}
      TAKSKLAD_SERVICE_NAME: ${TAKSKLAD_SERVICE_NAME}
      TAKSKLAD_API_TOKEN: ${TAKSKLAD_API_TOKEN}
      TAKSKLAD_TIMEZONE: ${TAKSKLAD_TIMEZONE:-Asia/Tashkent}
      TAKSKLAD_CORS_ORIGINS: ${TAKSKLAD_CORS_ORIGINS:-}
      YANDEX_GEOCODER_API_KEY: ${YANDEX_GEOCODER_API_KEY:-}
      TAKSKLAD_REQUIRED_WORKERS: ${TAKSKLAD_REQUIRED_WORKERS:-skladbot,smartup_auto_import,telegram}
      SKLADBOT_DAILY_REPORT_ENABLED: ${SKLADBOT_DAILY_REPORT_ENABLED:-false}
      SKLADBOT_DAILY_REPORT_CHAT_IDS: ${SKLADBOT_DAILY_REPORT_CHAT_IDS:-}
      SKLADBOT_DAILY_REPORT_HOUR: ${SKLADBOT_DAILY_REPORT_HOUR:-22}
      SKLADBOT_DAILY_REPORT_MINUTE: ${SKLADBOT_DAILY_REPORT_MINUTE:-0}
      SKLADBOT_DAILY_REPORT_RETRY_MINUTES: ${SKLADBOT_DAILY_REPORT_RETRY_MINUTES:-15}
      SKLADBOT_DAILY_REPORT_MAX_ATTEMPTS: ${SKLADBOT_DAILY_REPORT_MAX_ATTEMPTS:-3}
      SKLADBOT_DAILY_REPORT_GRACE_MINUTES: ${SKLADBOT_DAILY_REPORT_GRACE_MINUTES:-30}
      SKLADBOT_DAILY_REPORT_LOOKBACK_DAYS: ${SKLADBOT_DAILY_REPORT_LOOKBACK_DAYS:-1}
      TAKSKLAD_WEB_LOGIN: ${TAKSKLAD_WEB_LOGIN:-}
      TAKSKLAD_WEB_PASSWORD_HASH: ${TAKSKLAD_WEB_PASSWORD_HASH:-}
      TAKSKLAD_WEB_SESSION_SECRET: ${TAKSKLAD_WEB_SESSION_SECRET:-}
      TAKSKLAD_WEB_SESSION_TTL_SECONDS: ${TAKSKLAD_WEB_SESSION_TTL_SECONDS:-86400}
      TAKSKLAD_WEB_COOKIE_SECURE: ${TAKSKLAD_WEB_COOKIE_SECURE:-true}
      TAKSKLAD_WEB_LOGIN_MAX_ATTEMPTS: ${TAKSKLAD_WEB_LOGIN_MAX_ATTEMPTS:-5}
      TAKSKLAD_WEB_LOGIN_WINDOW_SECONDS: ${TAKSKLAD_WEB_LOGIN_WINDOW_SECONDS:-300}
      TAKSKLAD_WEB_LOGIN_LOCK_SECONDS: ${TAKSKLAD_WEB_LOGIN_LOCK_SECONDS:-900}
      TAKSKLAD_WEB_LOGIN_LIMITER_MAX_ENTRIES: ${TAKSKLAD_WEB_LOGIN_LIMITER_MAX_ENTRIES:-10000}
      TAKSKLAD_WEB_LOGIN_LIMITER_ENTRY_TTL_SECONDS: ${TAKSKLAD_WEB_LOGIN_LIMITER_ENTRY_TTL_SECONDS:-3600}
      TAKSKLAD_IDENTITY_AUTH_ENABLED: ${TAKSKLAD_IDENTITY_AUTH_ENABLED:-true}
      TAKSKLAD_LEGACY_AUTH_MODE: ${TAKSKLAD_LEGACY_AUTH_MODE:-enforce}
      TAKSKLAD_LEGACY_AUTH_EXPIRES_AT: ${TAKSKLAD_LEGACY_AUTH_EXPIRES_AT:-}
      TAKSKLAD_SERVICE_TOKEN_ROTATION_MAX_OVERLAP_SECONDS: ${TAKSKLAD_SERVICE_TOKEN_ROTATION_MAX_OVERLAP_SECONDS:-900}
      TAKSKLAD_INSECURE_LOCAL_ANONYMOUS: ${TAKSKLAD_INSECURE_LOCAL_ANONYMOUS:-false}
      TAKSKLAD_TRUSTED_PROXY_CIDRS: ${TAKSKLAD_TRUSTED_PROXY_CIDRS:?TAKSKLAD_TRUSTED_PROXY_CIDRS is required}
      SKLADBOT_CREATE_REQUESTS_MODE: ${SKLADBOT_CREATE_REQUESTS_MODE:-dry_run}
      SKLADBOT_SKU_MAPPING_JSON: ${SKLADBOT_SKU_MAPPING_JSON:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - type: bind
        source: /run/taksklad-observability
        target: /run/taksklad-observability
        read_only: true
    labels:
      - traefik.enable=true
      - traefik.http.routers.taksklad-backend.rule=Host(`${TAKSKLAD_BACKEND_HOST}`) && (PathPrefix(`/api`) || Path(`/health`) || Path(`/version`) || Path(`/ready`))
      - traefik.http.routers.taksklad-backend.entrypoints=websecure
      - traefik.http.routers.taksklad-backend.tls.certresolver=letsencrypt
      - traefik.http.routers.taksklad-backend.priority=100
      - traefik.http.routers.taksklad-backend.middlewares=taksklad-request-limit,taksklad-backend-security-headers
      - traefik.http.services.taksklad-backend.loadbalancer.server.port=8000
      - traefik.http.middlewares.taksklad-request-limit.buffering.maxRequestBodyBytes=33554432
      - traefik.http.middlewares.taksklad-backend-security-headers.headers.stsSeconds=31536000
      - traefik.http.middlewares.taksklad-backend-security-headers.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.taksklad-backend-security-headers.headers.stsPreload=false
      - traefik.http.middlewares.taksklad-backend-security-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.taksklad-backend-security-headers.headers.frameDeny=true
      - traefik.http.middlewares.taksklad-backend-security-headers.headers.referrerPolicy=same-origin
      - traefik.docker.network=${TRAEFIK_NETWORK:-traefik}
    networks:
      - taksklad-internal
      - traefik
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import json, os; from urllib.request import urlopen; response = urlopen('http://127.0.0.1:8000/health', timeout=5); payload = json.load(response); expected_service = os.environ.get('TAKSKLAD_SERVICE_NAME', '').strip(); expected_sha = os.environ.get('TAKSKLAD_COMMIT_SHA', '').strip().lower(); expected_digest = os.environ.get('TAKSKLAD_IMAGE_DIGEST', '').strip().lower(); valid = response.status == 200 and payload.get('status') == 'ok' and bool(expected_service) and payload.get('service') == expected_service and bool(payload.get('version')) and (not expected_sha or payload.get('commit_sha') == expected_sha) and (not expected_digest or payload.get('image_digest') == expected_digest); raise SystemExit(0 if valid else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    <<: *app-hardening
    image: ${TAKSKLAD_FRONTEND_IMAGE}
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      TAKSKLAD_BACKEND_INTERNAL_URL: http://backend-api:8000
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m,uid=101,gid=101,mode=1770
      - /etc/nginx/conf.d:rw,nosuid,nodev,size=4m,uid=101,gid=101,mode=0755
      - /var/cache/nginx:rw,nosuid,nodev,size=16m,uid=101,gid=101,mode=0755
      - /run:rw,nosuid,nodev,size=4m,uid=101,gid=101,mode=0755
    labels:
      - traefik.enable=true
      - traefik.http.routers.taksklad-frontend.rule=Host(`${TAKSKLAD_FRONTEND_HOST}`) || Host(`${TAKSKLAD_FRONTEND_WWW_HOST}`)
      - traefik.http.routers.taksklad-frontend.entrypoints=websecure
      - traefik.http.routers.taksklad-frontend.tls.certresolver=letsencrypt
      - traefik.http.routers.taksklad-frontend.priority=1
      - traefik.http.routers.taksklad-frontend.middlewares=taksklad-frontend-security-headers,taksklad-frontend-csp
      - traefik.http.routers.taksklad-frontend-http.rule=Host(`${TAKSKLAD_FRONTEND_HOST}`) || Host(`${TAKSKLAD_FRONTEND_WWW_HOST}`)
      - traefik.http.routers.taksklad-frontend-http.entrypoints=web
      - traefik.http.routers.taksklad-frontend-http.middlewares=taksklad-frontend-https-redirect
      - traefik.http.middlewares.taksklad-frontend-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.taksklad-frontend-https-redirect.redirectscheme.permanent=true
      - traefik.http.middlewares.taksklad-frontend-security-headers.headers.stsSeconds=31536000
      - traefik.http.middlewares.taksklad-frontend-security-headers.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.taksklad-frontend-security-headers.headers.stsPreload=false
      - traefik.http.middlewares.taksklad-frontend-security-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.taksklad-frontend-security-headers.headers.frameDeny=true
      - traefik.http.middlewares.taksklad-frontend-security-headers.headers.referrerPolicy=same-origin
      - traefik.http.middlewares.taksklad-frontend-csp.headers.contentSecurityPolicy=default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self' data:; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests; block-all-mixed-content
      - traefik.http.services.taksklad-frontend.loadbalancer.server.port=8080
      - traefik.docker.network=${TRAEFIK_NETWORK:-traefik}
    depends_on:
      backend-api:
        condition: service_started
    networks:
      - taksklad-internal
      - traefik
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  skladbot-worker:
    <<: *app-hardening
    image: ${TAKSKLAD_BACKEND_IMAGE}
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "app.skladbot_worker_runner"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TAKSKLAD_TIMEZONE: ${TAKSKLAD_TIMEZONE:-Asia/Tashkent}
      SKLADBOT_API_TOKEN: ${SKLADBOT_API_TOKEN:-}
      SKLADBOT_API_TOKENS: ${SKLADBOT_API_TOKENS:-}
      SKLADBOT_API_BASE_URL: ${SKLADBOT_API_BASE_URL:-https://api.skladbot.ru/v1}
      SKLADBOT_API_TIMEOUT_SECONDS: ${SKLADBOT_API_TIMEOUT_SECONDS:-8}
      SKLADBOT_API_MAX_RETRIES: ${SKLADBOT_API_MAX_RETRIES:-2}
      SKLADBOT_REQUEST_DELAY_SECONDS: ${SKLADBOT_REQUEST_DELAY_SECONDS:-2}
      SKLADBOT_MAX_COOLDOWN_WAIT_SECONDS: ${SKLADBOT_MAX_COOLDOWN_WAIT_SECONDS:-5}
      SKLADBOT_CUSTOMER_ID: ${SKLADBOT_CUSTOMER_ID:-6211}
      SKLADBOT_SHIPMENT_TYPE_ID: ${SKLADBOT_SHIPMENT_TYPE_ID:-3389}
      SKLADBOT_CREATE_REQUESTS_MODE: ${SKLADBOT_CREATE_REQUESTS_MODE:-dry_run}
      SKLADBOT_SKU_MAPPING_JSON: ${SKLADBOT_SKU_MAPPING_JSON:-}
      SKLADBOT_REQUEST_CREATE_LIMIT: ${SKLADBOT_REQUEST_CREATE_LIMIT:-20}
      SKLADBOT_CREATE_RECONCILE_DETAIL_LIMIT: ${SKLADBOT_CREATE_RECONCILE_DETAIL_LIMIT:-30}
      SKLADBOT_SYNC_LOOKBACK_DAYS: ${SKLADBOT_SYNC_LOOKBACK_DAYS:-1}
      SKLADBOT_SYNC_MAX_LOOKBACK_DAYS: ${SKLADBOT_SYNC_MAX_LOOKBACK_DAYS:-7}
      SKLADBOT_ORDER_CREATE_LEAD_DAYS: ${SKLADBOT_ORDER_CREATE_LEAD_DAYS:-3}
      SKLADBOT_DETAIL_LIMIT: ${SKLADBOT_DETAIL_LIMIT:-10}
      SKLADBOT_COMPLETED_BACKFILL_DAYS: ${SKLADBOT_COMPLETED_BACKFILL_DAYS:-2}
      SKLADBOT_REQUESTS_LIMIT: ${SKLADBOT_REQUESTS_LIMIT:-500}
      SKLADBOT_WORKER_INTERVAL_SECONDS: ${SKLADBOT_WORKER_INTERVAL_SECONDS:-60}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - taksklad-internal
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from app.db import SessionLocal; from app.worker_observability import build_worker_readiness; db=SessionLocal(); result=build_worker_readiness(db, required_workers=('skladbot',)); db.close(); raise SystemExit(0 if result['status']=='ok' else 1)\""]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  smartup-auto-import-worker:
    <<: *app-hardening
    image: ${TAKSKLAD_BACKEND_IMAGE}
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "app.smartup_auto_import_worker"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TAKSKLAD_ENV: ${TAKSKLAD_ENV}
      TAKSKLAD_TIMEZONE: ${TAKSKLAD_TIMEZONE:-Asia/Tashkent}
      SMARTUP_AUTO_IMPORT_ENABLED: ${SMARTUP_AUTO_IMPORT_ENABLED:-false}
      SMARTUP_AUTO_IMPORT_BACKEND_IMPORT_ENABLED: ${SMARTUP_AUTO_IMPORT_BACKEND_IMPORT_ENABLED:-false}
      SMARTUP_AUTO_IMPORT_CHANGE_STATUS_ENABLED: ${SMARTUP_AUTO_IMPORT_CHANGE_STATUS_ENABLED:-false}
      SMARTUP_AUTO_IMPORT_PROCESS_SKLADBOT_NOW: ${SMARTUP_AUTO_IMPORT_PROCESS_SKLADBOT_NOW:-false}
      SMARTUP_AUTO_IMPORT_SAGA_MODE: ${SMARTUP_AUTO_IMPORT_SAGA_MODE:-disabled}
      SMARTUP_AUTO_IMPORT_TIMES: ${SMARTUP_AUTO_IMPORT_TIMES:-12:00,15:00,17:50}
      SMARTUP_AUTO_IMPORT_DISABLED_WEEKDAYS: ${SMARTUP_AUTO_IMPORT_DISABLED_WEEKDAYS:-5,6}
      SMARTUP_AUTO_IMPORT_FINAL_TIME: ${SMARTUP_AUTO_IMPORT_FINAL_TIME:-17:50}
      SMARTUP_AUTO_IMPORT_LOGISTICS_DUE_TIME: ${SMARTUP_AUTO_IMPORT_LOGISTICS_DUE_TIME:-17:50}
      SMARTUP_AUTO_IMPORT_LOGISTICS_RETRY_BASE_SECONDS: ${SMARTUP_AUTO_IMPORT_LOGISTICS_RETRY_BASE_SECONDS:-60}
      SMARTUP_AUTO_IMPORT_LOGISTICS_MAX_ATTEMPTS: ${SMARTUP_AUTO_IMPORT_LOGISTICS_MAX_ATTEMPTS:-5}
      SMARTUP_AUTO_IMPORT_LOGISTICS_CATCHUP_DAYS: ${SMARTUP_AUTO_IMPORT_LOGISTICS_CATCHUP_DAYS:-2}
      SMARTUP_AUTO_IMPORT_LOGISTICS_CLAIM_TIMEOUT_MINUTES: ${SMARTUP_AUTO_IMPORT_LOGISTICS_CLAIM_TIMEOUT_MINUTES:-10}
      SMARTUP_AUTO_IMPORT_LOGISTICS_ROUTE_RECOVERY_EXPORT_DATE: ${SMARTUP_AUTO_IMPORT_LOGISTICS_ROUTE_RECOVERY_EXPORT_DATE:-}
      SMARTUP_AUTO_IMPORT_SLOT_GRACE_MINUTES: ${SMARTUP_AUTO_IMPORT_SLOT_GRACE_MINUTES:-10}
      SMARTUP_AUTO_IMPORT_POLL_SECONDS: ${SMARTUP_AUTO_IMPORT_POLL_SECONDS:-30}
      SMARTUP_AUTO_IMPORT_OUTPUT_DIR: ${SMARTUP_AUTO_IMPORT_OUTPUT_DIR:-outputs/smartup_exports}
      SMARTUP_AUTO_IMPORT_CLIENT_CHAT_ID: ${SMARTUP_AUTO_IMPORT_CLIENT_CHAT_ID:-}
      SMARTUP_AUTO_IMPORT_LOGISTICS_CHAT_ID: ${SMARTUP_AUTO_IMPORT_LOGISTICS_CHAT_ID:-}
      TAKSKLAD_AUTOMATION_ALERT_CHAT_ID: ${TAKSKLAD_AUTOMATION_ALERT_CHAT_ID:-}
      SMARTUP_AUTO_IMPORT_ALERT_CHAT_ID: ${SMARTUP_AUTO_IMPORT_ALERT_CHAT_ID:-}
      SMARTUP_AUTO_IMPORT_ROUTE_FINGERPRINT_KEY: ${SMARTUP_AUTO_IMPORT_ROUTE_FINGERPRINT_KEY:-}
      TELEGRAM_ADMIN_CHAT_IDS: ${TELEGRAM_ADMIN_CHAT_IDS:-}
      SMARTUP_AUTO_IMPORT_NEW_STATUS_CODE: ${SMARTUP_AUTO_IMPORT_NEW_STATUS_CODE:-B#N}
      SMARTUP_AUTO_IMPORT_WAITING_STATUS_CODE: ${SMARTUP_AUTO_IMPORT_WAITING_STATUS_CODE:-B#W}
      SMARTUP_AUTO_IMPORT_TERMINAL_PAYMENT_CODE: ${SMARTUP_AUTO_IMPORT_TERMINAL_PAYMENT_CODE:-PYMT:2}
      SMARTUP_BASE_URL: ${SMARTUP_BASE_URL:-https://smartup.online}
      SMARTUP_USERNAME: ${SMARTUP_USERNAME:-}
      SMARTUP_PASSWORD: ${SMARTUP_PASSWORD:-}
      SMARTUP_PROJECT_CODE: ${SMARTUP_PROJECT_CODE:-}
      SMARTUP_FILIAL_ID: ${SMARTUP_FILIAL_ID:-}
      SMARTUP_FILIAL_CODE: ${SMARTUP_FILIAL_CODE:-}
      SMARTUP_TIMEOUT_SECONDS: ${SMARTUP_TIMEOUT_SECONDS:-30}
      SKLADBOT_CREATE_REQUESTS_MODE: ${SKLADBOT_CREATE_REQUESTS_MODE:-dry_run}
      SKLADBOT_API_TOKEN: ${SKLADBOT_API_TOKEN:-}
      SKLADBOT_API_TOKENS: ${SKLADBOT_API_TOKENS:-}
      SKLADBOT_API_BASE_URL: ${SKLADBOT_API_BASE_URL:-https://api.skladbot.ru/v1}
      SKLADBOT_API_TIMEOUT_SECONDS: ${SKLADBOT_API_TIMEOUT_SECONDS:-8}
      SKLADBOT_API_MAX_RETRIES: ${SKLADBOT_API_MAX_RETRIES:-2}
      SKLADBOT_REQUEST_DELAY_SECONDS: ${SKLADBOT_REQUEST_DELAY_SECONDS:-2}
      SKLADBOT_MAX_COOLDOWN_WAIT_SECONDS: ${SKLADBOT_MAX_COOLDOWN_WAIT_SECONDS:-5}
      SKLADBOT_REQUEST_CREATE_LIMIT: ${SKLADBOT_REQUEST_CREATE_LIMIT:-20}
      SKLADBOT_SKU_MAPPING_JSON: ${SKLADBOT_SKU_MAPPING_JSON:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WORKER_FILE_TIMEOUT_SECONDS: ${TELEGRAM_WORKER_FILE_TIMEOUT_SECONDS:-120}
      YANDEX_GEOCODER_API_KEY: ${YANDEX_GEOCODER_API_KEY:-}
      TAKSKLAD_DEFAULT_PIECES_PER_BLOCK: ${TAKSKLAD_DEFAULT_PIECES_PER_BLOCK:-10}
      TAKSKLAD_DEFAULT_BLOCK_PRICE: ${TAKSKLAD_DEFAULT_BLOCK_PRICE:-240000}
    volumes:
      - type: bind
        source: ${TAKSKLAD_OUTPUTS_PATH:-../../outputs}
        target: /app/outputs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - taksklad-internal
    healthcheck:
      test: ["CMD-SHELL", "python -m app.smartup_auto_import_worker status --json >/dev/null && python -c \"from app.db import SessionLocal; from app.worker_observability import build_worker_readiness; db=SessionLocal(); result=build_worker_readiness(db, required_workers=('smartup_auto_import',)); db.close(); raise SystemExit(0 if result['status']=='ok' else 1)\""]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  telegram-worker:
    <<: *app-hardening
    image: ${TAKSKLAD_BACKEND_IMAGE}
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "app.telegram_worker_runner"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TAKSKLAD_ENV: ${TAKSKLAD_ENV}
      TAKSKLAD_API_TOKEN: ${TAKSKLAD_API_TOKEN}
      TAKSKLAD_BACKEND_INTERNAL_URL: http://backend-api:8000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
